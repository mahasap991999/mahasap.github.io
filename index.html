<script>
const GAS_API_URL = localStorage.getItem('mahasap_api_url') || 'https://script.google.com/macros/s/AKfycbyedjnUwOK2GRQavmKHYTpNIB0Zd9fZ6V6RjSHBglUan82BOU6Z0IWnXgT5r0dqhvV4qg/exec';

// Show URL config prompt if not set
window.addEventListener('DOMContentLoaded', () => {
  if (!GAS_API_URL) {
    document.getElementById('api-url-hint').innerHTML =
      '<a href="#" onclick="promptApiUrl()" class="text-blue-500 underline">⚙️ Set API URL</a>';
  }
});

function promptApiUrl() {
  const url = prompt('Enter your Google Apps Script Web App URL:\n(Deploy → New deployment → Web App → Anyone)');
  if (url && url.trim().startsWith('https://')) {
    localStorage.setItem('mahasap_api_url', url.trim());
    location.reload();
  }
}
</script>

<script>
// ═══ HELPERS ═══════════════════════════════════════════════════
/* ─── HELPERS ────────────────────────────────────────────── */
const fmt = {
  currency(amount) { const n = Number(amount||0); return new Intl.NumberFormat('en-US').format(n) + ' ₭'; },
  number(amount) { const n = Number(amount||0); return new Intl.NumberFormat('en-US').format(n); },
  dateTime(d) {
    const pad = x => String(x).padStart(2,'0');
    const dt = (d instanceof Date) ? d : new Date(d);
    if (isNaN(dt)) return '';
    return `${pad(dt.getDate())}/${pad(dt.getMonth()+1)}/${dt.getFullYear()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
  },
  dateYMD(d) { const dt = (d instanceof Date) ? d : new Date(d); return `${dt.getFullYear()}/${dt.getMonth()+1}/${dt.getDate()}`; },
  uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }
};

function debounce(fn, delay=300) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), delay); };
}

function printReceipt() {
  const el = document.getElementById("printable-receipt");
  if (!el) return;
  const clone = el.cloneNode(true);
  clone.querySelectorAll(".print-hidden").forEach(e=>e.remove());
  const w = window.open("","","width=400,height=600");
  w.document.write(`<html><head><title>Receipt</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao&display=swap" rel="stylesheet">
    <style>body{font-family:'Noto Sans Lao',sans-serif;font-size:10pt;margin:0;padding:0;}
    .receipt-container{width:80mm;padding:4mm;line-height:1.3;}
    .receipt-title{font-size:14pt;font-weight:bold;text-align:center;}
    .receipt-sub{font-size:10pt;text-align:center;}
    .receipt-date{font-size:11pt;text-align:center;}
    .receipt-customername{font-size:12pt;font-weight:600;}
    .dashed{border-top:1px dashed #000;margin:4px 0;}
    .row{display:flex;justify-content:space-between;margin:2px 0;}
    .receipt-item-top{font-size:12pt;font-weight:300;display:flex;}
    .receipt-item-sub{font-size:12pt;font-weight:300;display:flex;justify-content:space-between;}
    .font-bold{font-weight:600;}
    .text-blue-600{color:#2563eb;}.text-red-600{color:#dc2626;}
    </style></head><body><div class="receipt-container">${clone.innerHTML}</div></body></html>`);
  w.document.close();
  w.focus();
  w.print();
}
</script>

  run(fn, ...args) {
    return new Promise((res, rej) => {
      if (typeof google !== 'undefined' && google.script?.run) {
        google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn](...args);
      } else {
        rej(new Error("Google Apps Script not available."));
      }
    });

  /* ── DATA LOADING (lazy) ── */
  async fetchData() {
    this.state.loading = true;
    this.state._loaded.sales = false;
    this.state._loaded.purchases = false;
    document.getElementById('app-loading').classList.remove('hidden');
    document.getElementById('app-root').classList.add('hidden');
    // document.getElementById('login-screen').style.display = 'none';
    try {
      const data = await this.run('fetchCoreData');
      if (!data) throw new Error('Server returned null. Check Apps Script logs for details.');
      this.state.products   = data.products   || [];
      this.state.customers  = data.customers  || [];
      this.state.discounts  = data.discounts  || [];
      this.state.expenses   = data.expenses   || [];
      this.state.suppliers  = data.suppliers  || [];
      this.state.sales      = [];
      this.state.purchases  = [];
      if (data.error) console.warn('fetchCoreData warning:', data.error);
    } catch(err) {
      console.error('fetchCoreData failed:', err);
      alert('⚠️ Failed to load data.\n\nError: ' + (err.message || err) + '\n\nSteps to fix:\n1. Open Apps Script editor\n2. Run setupSheets() once\n3. Push latest code (clasp push)\n4. Reload the app');
      this.state.products = []; this.state.customers = []; this.state.discounts = [];
      this.state.expenses = []; this.state.suppliers = [];
      this.state.sales = []; this.state.purchases = [];
    } finally {
      this.state.loading = false;
      document.getElementById('app-loading').classList.add('hidden');
      document.getElementById('app-root').classList.remove('hidden');
      this.render();
    }
  },

  async ensureSalesLoaded() {
    if (this.state._loaded.sales) return;
    const res = await this.run('fetchSales');
    // Automatically filter out any blank entries coming from the spreadsheet rows
    this.state.sales = (res.sales || []).filter(s => s && s.billNo && String(s.billNo).trim() !== '');
    this.state._loaded.sales = true;
  },
  async ensurePurchasesLoaded() {
    if (this.state._loaded.purchases) return;
    const res = await this.run('fetchPurchases');
    this.state.purchases = res.purchases || [];
    this.state._loaded.purchases = true;
  },

  async refreshProductsFromServer() {
    const data = await this.run('fetchCoreData');
    if (data?.products) this.state.products = data.products;
  },

/* ── PURCHASE MANAGEMENT ACTIONS ── */
  addToPurchaseCart(productId) {
    const prod = this.state.products.find(p => String(p.id) === String(productId));
    if (!prod) return;

    const existing = this.state.purchaseCart.find(item => String(item.id) === String(productId));
    
    if (existing) {
      existing.qty = prod.weightItem ? Math.round((existing.qty + 1) * 1000) / 1000 : existing.qty + 1;
    } else {
      // Default purchase unit
      const defUnit = prod.boxUnit ? 'box' : (prod.packUnit ? 'pack' : 'base');
      
      // FIX: Since the Google Sheet now stores the correct box/pack cost directly,
      // we just take the exact costPrice from the product without multiplying it!
      const defCost = Number(prod.costPrice) || 0;

      this.state.purchaseCart.push({
        id: prod.id, 
        name: prod.name,
        weightItem: prod.weightItem || false,
        baseUnit: prod.baseUnit || '', 
        packUnit: prod.packUnit || '', 
        boxUnit: prod.boxUnit || '',
        qtyInPack: prod.qtyInPack || 1, 
        qtyInBox: prod.qtyInBox || 1,
        qty: 1, 
        purchaseUnit: defUnit, 
        costPrice: prod.costPrice
      });
    }
    
    this.render();
  },
  
  updatePurchaseCartQty(id, qty) {
    const item = this.state.purchaseCart.find(x => String(x.id) === String(id));
    if (!item) return;
    item.qty = Math.max(1, parseInt(qty) || 1);
    this.render();
  },

  updatePurchaseCartCost(id, cost) {
    const item = this.state.purchaseCart.find(x => String(x.id) === String(id));
    if (!item) return;
    item.costPrice = Math.max(0, parseFloat(cost) || 0);
    this.render();
  },

  removeFromPurchaseCart(id) {
    this.state.purchaseCart = this.state.purchaseCart.filter(x => String(x.id) !== String(id));
    this.render();
  },

  async submitPurchaseForm() {
    const supplierInput = document.getElementById('purchase-supplier-name')?.value.trim();
    if (!supplierInput) {
      alert(this.state.language === 'lo' ? 'ກະລຸນາໃສ່ຊື່ຜູ້ສະໜອງ!' : 'Please enter a supplier name!');
      return;
    }
    if (this.state.purchaseCart.length === 0) {
      alert(this.state.language === 'lo' ? 'ກະລຸນາເພີ່ມສິນຄ້າຢ່າງໜ້ອຍ 1 ລາຍການ!' : 'Please add at least 1 item!');
      return;
    }
    const matchedSupplier = this.state.suppliers.find(s => String(s.name).trim() === supplierInput);
    const purchasePayload = {
      id: 'PUR-' + fmt.uid().toUpperCase(),
      date: fmt.dateTime(new Date()),
      supplier: supplierInput,
      supplierId: matchedSupplier?.id || '',
      by: this.state.currentUser?.name || '',
      items: this.state.purchaseCart.map(item => {
        var stockQty = item.weightItem ? item.qty
          : item.purchaseUnit==='box'  ? item.qty*(item.qtyInBox||1)
          : item.purchaseUnit==='pack' ? item.qty*(item.qtyInPack||1)
          : item.qty;
        return Object.assign({}, item, {stockQty: stockQty});
      }),
    };

    try {
      const res = await this.run('addPurchase', purchasePayload);
      if (res.success) {
        alert(this.t('purchaseSaved'));
        
        // 1. Reset the UI
        this.state.purchaseCart = [];
        
        // 2. Fetch fresh data from the server (This now includes the new prices)
        await this.refreshProductsFromServer(); 
        
        // 👇 ADD THIS LINE TO FORCE A FRESH FETCH FROM THE SHEET
        this.state._loaded.purchases = false; 
        
        await this.ensurePurchasesLoaded();
        
        // 3. Render
        this.render();
      } else {
        alert('Error: ' + res.message);
      }
    } catch(err) {
      alert('Network Error: ' + err.toString());
    }
  },

      if (res.success) {

        this.state.appliedDiscount = { id: res.discountId, code: res.discountCode, type: res.discountType, value: res.discountValue };

  /* ── CART ── */
  addToCart(product) {
    if (product.stock !== null && product.stock !== undefined && product.stock <= 0) {
      alert(this.t('outOfStock') + ': ' + (product.name[this.state.language] || ''));
      return;
    }
    // Check if already in cart (same product, same default unit)
    // Use !== 0 so negative prices (e.g. returns/credits) are also valid
    const _defUnit = (Number(product.priceBase) !== 0 && product.baseUnit) ? 'base'
                   : (Number(product.pricePack) !== 0 && product.packUnit) ? 'pack'
                   : (Number(product.priceBox)  !== 0 && product.boxUnit)  ? 'box'
                   : (product.packUnit ? 'pack' : (product.boxUnit ? 'box' : 'base'));
    const existing = this.state.cart.find(x => x.id === product.id && (x.selectedUnit||'base') === _defUnit);
    if (existing) {
      if (product.weightItem) existing.qty = Math.round((existing.qty+1)*1000)/1000;
      else existing.qty += 1;
      App._lastCartHighlight = existing.cartItemId;
      this._patchCart();
      return;
    }
    // Pick the default unit based on what the product actually has priced (non-zero includes negatives)
    const defUnit = (Number(product.priceBase) !== 0 && product.baseUnit) ? 'base'
                  : (Number(product.pricePack) !== 0 && product.packUnit) ? 'pack'
                  : (Number(product.priceBox)  !== 0 && product.boxUnit)  ? 'box'
                  : (product.packUnit ? 'pack' : (product.boxUnit ? 'box' : 'base'));
    const defPrice = defUnit === 'box'  ? Number(product.priceBox)
                   : defUnit === 'pack' ? Number(product.pricePack)
                   : Number(product.priceBase) || Number(product.price) || 0;
    const newItem = {
      ...product,
      cartItemId: fmt.uid(),
      qty: 1,
      selectedUnit: defUnit,
      price: defPrice,
    };
    this.state.cart.push(newItem);
    App._lastCartHighlight = newItem.cartItemId;
    this._patchCart();
  },
  
  updateCart(cid, qty, price) {
    const item = this.state.cart.find(x => x.cartItemId === cid);
    if (!item) return;
    if (qty !== undefined) {
      if (item.weightItem) item.qty = Math.round((parseFloat(qty)||0)*1000)/1000;
      else item.qty = Math.round(qty);
      if (item.qty <= 0) {
        this.state.cart = this.state.cart.filter(x => x.cartItemId !== cid);
        this._patchCart(); return;
      }
      // Stock cap
      const stock = item.stock;
      if (stock !== null && stock !== undefined) {
        const baseQty = item.selectedUnit==='box'  ? item.qty*(item.qtyInBox||1)
                      : item.selectedUnit==='pack' ? item.qty*(item.qtyInPack||1)
                      : item.qty;
        if (baseQty > stock) {
          item.qty = item.selectedUnit==='box'  ? Math.floor(stock/(item.qtyInBox||1))
                   : item.selectedUnit==='pack' ? Math.floor(stock/(item.qtyInPack||1))
                   : item.weightItem ? Math.round(stock*1000)/1000 : Math.floor(stock);
        }
      }
    }
    if (price !== undefined) item.price = Math.max(0, price);
    App._lastCartHighlight = item.cartItemId;
    this._patchCart();
  },

  updateCartUnit(cid, unitKey) {
    const item = this.state.cart.find(x => x.cartItemId === cid);
    if (!item) return;
    item.selectedUnit = unitKey;
    if      (unitKey==='box')  item.price = (item.priceBox  !== undefined && item.priceBox  !== null) ? Number(item.priceBox)  : (Number(item.priceBase) || item.price);
    else if (unitKey==='pack') item.price = (item.pricePack !== undefined && item.pricePack !== null) ? Number(item.pricePack) : (Number(item.priceBase) || item.price);
    else                       item.price = Number(item.priceBase) || item.price;
    App._lastCartHighlight = item.cartItemId;
    this._patchCart();
  },

  editSale(billNo) {
    const sale = this.state.sales.find(s => String(s.billNo) === String(billNo));
    if (!sale) { alert('Sale not found: ' + billNo); return; }
    this.state.cart = (sale.items || []).map(item => {
      // Merge current product data so unit matrix fields are available
      const prod = this.state.products.find(p => String(p.id) === String(item.id)) || {};
      return Object.assign({}, prod, item, {
        cartItemId:   String(item.id||'') + '_' + Date.now() + Math.random().toString(36).slice(2),
        qty:          Number(item.qty)   || 1,
        price:        Number(item.price) || 0,
        selectedUnit: item.selectedUnit  || 'base',
        weightItem:   item.weightItem    ?? prod.weightItem ?? false,
        baseUnit:     item.baseUnit      || prod.baseUnit   || '',
        packUnit:     item.packUnit      || prod.packUnit   || '',
        boxUnit:      item.boxUnit       || prod.boxUnit    || '',
        qtyInPack:    item.qtyInPack     || prod.qtyInPack  || 1,
        qtyInBox:     item.qtyInBox      || prod.qtyInBox   || 1,
        priceBase:    (item.priceBase  !== undefined && item.priceBase  !== null) ? Number(item.priceBase)  : (Number(prod.priceBase)  || 0),
        pricePack:    (item.pricePack  !== undefined && item.pricePack  !== null) ? Number(item.pricePack)  : (Number(prod.pricePack)  || 0),
        priceBox:     (item.priceBox   !== undefined && item.priceBox   !== null) ? Number(item.priceBox)   : (Number(prod.priceBox)   || 0),
        stock:        prod.stock         ?? null,
      });
    });
    this.state.discount        = Number(sale.discount)    || 0;
    this.state.discountCode    = sale.discountCode        || '';
    this.state.appliedDiscount = null;
    this._int.editingSaleBillNo = sale.billNo;
    this._int.originalSaleData  = sale;
    // Seed pending customer name so the cart input pre-fills and Payment captures it
    const walkIn = this.t('walkInCustomer');
    this._int._pendingCustomerName = (sale.customer && sale.customer !== walkIn) ? sale.customer : '';
    this.setCurrentPage('sell');
  },

  clearCart() {
    const wasEditing = !!this._int.editingSaleBillNo;
    this.state.cart = [];
    this.state.discount = 0;
    this.state.discountCode = '';
    this.state.appliedDiscount = null;
    this._int.editingSaleBillNo = null;
    this._int.originalSaleData = null;
    this._int._pendingCustomerName = '';
    // Also clear the cart customer name inputs in the DOM
    document.querySelectorAll('.cart-customer-name-inp').forEach(inp => { inp.value = ''; });
    this._patchCart();
    if (wasEditing) { this.setCurrentPage('saleRecord'); return; }
    // Return focus to scanner
    setTimeout(() => {
      const hw = document.getElementById('hw-barcode-input');
      if (hw) hw.focus({ preventScroll: true });
    }, 0);
  },

  /* Full cart re-render — called only when items are added or removed */
  _patchCart() {
    const cartContainers = document.querySelectorAll('.cart-items-zone');
    const grandTotal = this.state.cart.reduce((s,i) => s + i.price * i.qty, 0);

    const _cartItemHtml = (item) => {
      const cid   = item.cartItemId;
      const qty   = Number(item.qty)   || 0;
      const price = Number(item.price) || 0;
      const lang  = this.state.language;
      const name  = (item.name && (item.name[lang] || item.name.lo || item.name.en)) || '';
      const isWeight = !!item.weightItem;

      // Unit selector
      // Translate raw unit string (e.g. "Crate") to current language via translation keys
      const _tUnit = (u) => {
        if (!u) return '';
        const key = 'unit' + u.charAt(0).toUpperCase() + u.slice(1);
        return App.translations[App.state.language][key] || u;
      };
      let unitSel = '';
      if (!isWeight) {
        // Include units with any non-zero price — this covers negative prices (returns/credits)
        const opts = [
          ...(item.baseUnit && Number(item.priceBase) !== 0 ? [{key:'base', label: _tUnit(item.baseUnit)}] : []),
          ...(item.packUnit && Number(item.pricePack) !== 0 ? [{key:'pack', label: _tUnit(item.packUnit)}] : []),
          ...(item.boxUnit  && Number(item.priceBox)  !== 0 ? [{key:'box',  label: _tUnit(item.boxUnit) }] : []),
        ];
        if (opts.length > 1) {
          const sel = item.selectedUnit || 'base';
          const pills = opts.map(o => {
            const cls = sel===o.key ? 'bg-green-600 text-white border-green-600' : 'bg-white text-gray-600 border-gray-300 hover:bg-gray-100';
            return `<button onclick="App.updateCartUnit('${cid}','${o.key}')" class="px-2.5 py-1 rounded-full text-xs font-bold border transition ${cls}">${o.label}</button>`;
          }).join('');
          const dropts = opts.map(o => `<option value="${o.key}" ${(item.selectedUnit||'base')===o.key?'selected':''}>${o.label}</option>`).join('');
          unitSel = `<span class="hidden lg:flex items-center gap-1">${pills}</span>`
                  + `<span class="lg:hidden"><select onchange="App.updateCartUnit('${cid}',this.value)" class="border border-green-600 rounded text-xs px-1.5 py-0.5 bg-green-600 text-white font-bold">${dropts}</select></span>`;
        } else if (opts.length === 1) {
          unitSel = `<span class="text-xs text-gray-500">${opts[0].label}</span>`;
        }
      }

      // Qty controls
      let qtyCtrl = '';
      if (isWeight) {
        const shortcuts = [0.1,0.25,0.5,1.0].map(w =>
          `<button onclick="App.updateCart('${cid}',${Math.round((qty+w)*1000)/1000})" class="px-1.5 py-0.5 rounded bg-blue-100 hover:bg-blue-200 text-blue-800 text-xs font-bold">+${w}</button>`
        ).join('');
        qtyCtrl = `<div class="flex flex-col gap-1">
          <div class="flex items-center gap-1">
            <button onclick="App.updateCart('${cid}',${Math.round((qty-0.5)*1000)/1000})" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-red-100 flex items-center justify-center text-xs font-bold">−</button>
            <input type="number" step="0.001" value="${qty}" onchange="App.updateCart('${cid}',parseFloat(this.value)||0)" onblur="App._hwRefocus()" class="w-16 text-center border rounded hide-arrows text-xs font-mono">
            <button onclick="App.updateCart('${cid}',${Math.round((qty+0.5)*1000)/1000})" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-green-100 flex items-center justify-center text-xs font-bold">+</button>
            <span class="text-xs text-gray-500">${item.baseUnit||'kg'}</span>
          </div>
          <div class="flex gap-1">${shortcuts}</div>
        </div>`;
      } else {
        qtyCtrl = `<div class="flex items-center gap-1">
          <button onclick="App.updateCart('${cid}',${qty-1})" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-red-100 flex items-center justify-center text-xs font-bold leading-none">−</button>
          <input type="number" step="1" value="${qty}" onchange="App.updateCart('${cid}',parseInt(this.value)||0)" onblur="App._hwRefocus()" class="w-10 text-center border rounded hide-arrows text-xs">
          <button onclick="App.updateCart('${cid}',${qty+1})" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-green-100 flex items-center justify-center text-base font-bold leading-none">+</button>
        </div>`;
      }

      const imgSrc = item.image || `https://picsum.photos/seed/${item.id}/80/80`;
      const imgHtml = `<img src="${imgSrc}" onerror="this.src='https://picsum.photos/seed/${item.id}/80/80'" style="width:36px;height:36px;object-fit:cover;border-radius:5px;flex-shrink:0;border:1px solid #e5e7eb">`;

      const priceCtrl = `<div class="flex items-center gap-1">
            <button onclick="App.updateCart('${cid}',undefined,${price-1000})" class="w-7 h-7 rounded-full bg-yellow-100 hover:bg-yellow-200 flex items-center justify-center text-xs font-bold">−</button>
            <input type="number" value="${price}" onchange="App.updateCart('${cid}',undefined,parseFloat(this.value)||0)" onblur="App._hwRefocus()" class="w-20 text-center border rounded hide-arrows text-xs">
            <button onclick="App.updateCart('${cid}',undefined,${price+1000})" class="w-7 h-7 rounded-full bg-yellow-100 hover:bg-yellow-200 flex items-center justify-center text-xs font-bold">+</button>
          </div>`;

      return `<div class="border-b p-2 flex flex-col bg-white" data-cart-id="${cid}">
        <div class="flex justify-between items-center mb-1">
          <div class="flex items-center gap-2 flex-wrap">
            <span class="font-medium text-xs">${name}</span>
            ${isWeight ? '<span class="text-xs bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded font-bold">⚖️</span>' : ''}
            ${unitSel}
          </div>
          <div class="flex items-center gap-2">
            <span class="font-bold text-green-700 text-xs item-total">${fmt.currency(price*qty)}</span>
            <button onclick="App.updateCart('${cid}',0)" class="w-6 h-6 rounded-full bg-red-100 hover:bg-red-500 text-red-500 hover:text-white font-bold text-sm flex items-center justify-center">×</button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          ${imgHtml}
          <div class="flex items-center gap-1 flex-wrap">
            ${qtyCtrl}
            ${priceCtrl}
          </div>
        </div>
      </div>`;
    };

    const html = this.state.cart.length === 0
      ? `<div class="flex items-center justify-center h-full text-gray-400 text-sm py-8">${this.t('cart')}</div>`
      : this.state.cart.map(item => _cartItemHtml(item)).join('');

    // Preserve scroll position when re-rendering
    cartContainers.forEach(el => {
      const scrollTop = el.scrollTop;
      el.innerHTML = html;
      el.scrollTop = scrollTop;
    });

    document.querySelectorAll('.cart-grand-total').forEach(el => { el.textContent = fmt.currency(grandTotal); });
    document.querySelectorAll('.cart-pay-btn').forEach(btn => {
      btn.disabled = this.state.cart.length === 0;
      btn.classList.toggle('disabled:bg-gray-400', this.state.cart.length === 0);
    });

    // ── Highlight the last added/updated cart item ──
    if (App._lastCartHighlight) {
      cartContainers.forEach(container => {
        const el = container.querySelector(`[data-cart-id="${App._lastCartHighlight}"]`);
        if (el) {
          el.style.transition = 'background 0.15s';
          el.style.background = '#bbf7d0';
          el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          setTimeout(() => { if (el) el.style.background = ''; }, 1000);
        }
      });
    }

    // ── Refocus hw-barcode-input unless a real user input has focus ──
    setTimeout(() => {
      const ae = document.activeElement;
      const isUserInput = ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA')
        && ae.id !== 'hw-barcode-input'
        && !ae.classList.contains('cart-customer-name-inp');
      if (!isUserInput) {
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus();
      }
    }, 50);
  },

  /* ── BARCODE SCANNER (hardware only) ── */

  // Called by hardware scanner listener when barcode is read
  addToCartByBarcode(barcode) {
    if (!barcode) return;
    const b = String(barcode).trim();
    const product = this.state.products.find(p => String(p.barcode||'').trim() === b);
    if (product) {
      this.addToCart(product);
      return true;
    } else {
      // Show barcode in search briefly so cashier sees what was scanned
      this.state.searchQuery = b; this.render();
      setTimeout(() => { this.state.searchQuery = ''; this.render(); }, 2500);
      return false;
    }
  },

  // Hardware scanner: intercepts rapid keystrokes globally when on sell page
  _hwScannerCleanup: null,
  _searchFocused: false,
  attachHardwareScannerListener() {
    if (this._hwScannerCleanup) { this._hwScannerCleanup(); this._hwScannerCleanup = null; }
    let buffer = '', bufferTimer = null, lastKeyTime = 0;
    const onKeyDown = (e) => {
      const activeId = document.activeElement?.id;
      const tag = document.activeElement?.tagName;
      // Always allow typing in real user inputs (search box, payment fields, etc.)
      // EXCEPT redirect to barcode logic if keystrokes arrive fast (scanner speed <50ms/key)
      const now = Date.now();
      const isFast = (now - lastKeyTime) < 60; // scanners fire keys every ~5-20ms
      lastKeyTime = now;
      // If the search input is focused and keystrokes are NOT scanner-fast, let them type normally
      if ((tag === 'INPUT' || tag === 'TEXTAREA')) {
        if (!isFast && buffer.length === 0) return; // human typing in a real input — ignore
        // If fast keystrokes arrive while a real input is focused, it's the scanner — buffer them
      }
      if (e.key === 'Enter') {
        if (buffer.length >= 3) {
          e.preventDefault();    // block Enter from triggering clicks/submits
          e.stopPropagation();   // prevent any further handlers from seeing it
          const s = buffer; buffer = ''; clearTimeout(bufferTimer);
          this.addToCartByBarcode(s);
        } else {
          buffer = '';
        }
        return;
      }
      if (e.key.length !== 1) return;
      buffer += e.key;
      clearTimeout(bufferTimer);
      // Discard if input stops for >300ms (human typing pace)
      bufferTimer = setTimeout(() => { buffer = ''; }, 300);
    };
    document.addEventListener('keydown', onKeyDown, true); // capture phase so we get it first
    this._hwScannerCleanup = () => document.removeEventListener('keydown', onKeyDown, true);
  },
  detachHardwareScannerListener() {
    if (this._hwScannerCleanup) { this._hwScannerCleanup(); this._hwScannerCleanup = null; }
  },

  /* ── NAVIGATION ── */
  async setCurrentPage(page) {
    if (!this.isAdmin() && ['promotions','users','settings','expenses','suppliers'].includes(page)) return;
    // Detach scanner focus guard only when leaving sell page
    if (this.state.currentPage === 'sell' && page !== 'sell') {
      if (typeof App._detachScanFocusGuard === 'function') App._detachScanFocusGuard();
    }
    // Hardware scanner: listen on sell page only
    if (page === 'sell') this.attachHardwareScannerListener();
    else this.detachHardwareScannerListener();
    this.state.currentPage = page;
    this.state.isSidebarOpen = false;
    this.state.searchQuery = '';
    const needsSales = ['saleRecord', 'reprint'].includes(page);
    const needsPurchases = page === 'purchases';
    if (needsSales || needsPurchases) {
      this.state.pageLoading = true;
      this.render();
      try {
        if (needsSales) await this.ensureSalesLoaded();
        if (needsPurchases) await this.ensurePurchasesLoaded();
      } catch (e) {
        alert('Load failed: ' + (e.message || e));
      }
      this.state.pageLoading = false;
    }
    if (page === 'shift') {
      await this.loadShiftData();
    }
    if (page === 'reports') {
      this.state.pageLoading = true;
      this.render();
      this.state.reportData = await this.run('getReportData');
      if (this._int.reportTab === 'profit') {
        this._int.profitReport = await this.run('getProfitReport', this._int.profitDateFrom || '', this._int.profitDateTo || '');
      }
      this.state.pageLoading = false;
    }
    if (page === 'users' && this.isAdmin()) {
      this._int.users = await this.run('getUsers');
    }
    this.render();
    // Re-attach scanner focus guard and focus after render completes
    if (page === 'sell') {
      setTimeout(() => {
        if (typeof App._attachScanFocusGuard === 'function') App._attachScanFocusGuard();
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus({ preventScroll: true });
      }, 50);
    }
  },
  setLanguage(l) { this.state.language = l; this.render(); },
  toggleSidebar(v) { this.state.isSidebarOpen = v; this.render(); },
  setSearchQuery(q) { this.state.searchQuery = q; this.render(); },
  setSelectedCategory(cat) {
    this._int.selectedCategory = cat;
    this.render();
    // Return focus to scanner after category button triggers a re-render
    if (this.state.currentPage === 'sell') {
      setTimeout(() => {
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus({ preventScroll: true });
      }, 0);
    }
  },

  /* ── PAYMENT MODAL ── */
  openPaymentModal() {
    if (!this.state.cart.length) return;
    // Capture customer name NOW, before render() destroys the sell-page DOM
    this._int._pendingCustomerName = (typeof this._getCartCustomerName === 'function' ? this._getCartCustomerName() : '') || '';
    this._int.paymentModal = true;
    this.render();
    requestAnimationFrame(() => {
      const isEditing = !!this._int.editingSaleBillNo;
      const orig = this._int.originalSaleData;
      const pmSel = document.getElementById('payment-method-select');
      const discEl = document.getElementById('payment-discount');
      const cashEl = document.getElementById('cash-received');
      const transEl = document.getElementById('transfer-received');
      const notesEl = document.getElementById('payment-notes');
      const custSel = document.getElementById('customer-select');
      const manualEl = document.getElementById('manual-customer-name');
      if (!isEditing) {
        this.state.discount = 0;
        if (pmSel) { pmSel.value = 'cash'; this.handlePaymentMethodChange('cash'); }
        if (discEl) discEl.value = '0';
        if (transEl) transEl.value = '';
        if (notesEl) notesEl.value = '';
        if (custSel) custSel.value = 'walkin';
        if (manualEl) manualEl.value = this._int._pendingCustomerName || '';
        const phoneEl = document.getElementById('customer-phone'); if (phoneEl) phoneEl.value = '';
        this.validateCashInput();
        return;
      }
      if (!orig) return;
      // _pendingCustomerName was already captured from the cart input at line 896.
      // Use it if the user changed it; otherwise fall back to the originally saved customer.
      const editCustomer = this._int._pendingCustomerName || orig.customer || '';
      this._int._pendingCustomerName = editCustomer;
      if (editCustomer && editCustomer !== this.t('walkInCustomer')) {
        const mc = this.state.customers.find(c => c.name === editCustomer);
        if (mc && custSel) { custSel.value = mc.id; }
        else { if (custSel) custSel.value = 'walkin'; if (manualEl) manualEl.value = editCustomer; }
      }
      if (pmSel && orig.paymentMethod) { pmSel.value = orig.paymentMethod; this.handlePaymentMethodChange(orig.paymentMethod); }
      this.state.discount = orig.discount || 0;
      if (discEl) discEl.value = this.state.discount;
      if (cashEl && orig.cashReceived !== undefined) { cashEl.value = orig.cashReceived; this.calculateChange(); }
      if (transEl && orig.transferReceived !== undefined) { transEl.value = orig.transferReceived; } // <-- ADD THIS
      this.calculateChange();
      if (notesEl) notesEl.value = orig.notes || '';
    });
  },
  closePaymentModal() { this._int.paymentModal = false; this.render(); },

  /* ── CUSTOMER AUTOCOMPLETE (custom dropdown for Noto Sans Lao font) ── */
  _filterCustomerList(q) {
    const dropdown = document.getElementById('customer-dropdown');
    if (!dropdown) return;
    const term = (q || '').toLowerCase();
    let any = false;
    dropdown.querySelectorAll('.cust-opt').forEach(el => {
      const name = (el.dataset.name || '').toLowerCase();
      const phone = (el.querySelector('span')?.textContent || '').toLowerCase();
      const match = !term || name.includes(term) || phone.includes(term);
      el.style.display = match ? 'block' : 'none';
      if (match) any = true;
    });
    dropdown.style.display = any ? 'block' : 'none';
  },
  _filterSupplierList(q) {
    const dropdown = document.getElementById('supplier-dropdown');
    if (!dropdown) return;
    const term = (q || '').toLowerCase();
    let any = false;
    dropdown.querySelectorAll('.sup-opt').forEach(el => {
      const name = (el.dataset.name || '').toLowerCase();
      const match = !term || name.includes(term);
      el.style.display = match ? 'block' : 'none';
      if (match) any = true;
    });
    dropdown.style.display = any ? 'block' : 'none';
  },
  _selectSupplier(name) {
    const inp = document.getElementById('purchase-supplier-name');
    const dropdown = document.getElementById('supplier-dropdown');
    if (inp) { inp.value = name; App._int.purchaseSupplier = name; }
    if (dropdown) dropdown.style.display = 'none';
  },

  _selectCustomer(id, name) {
    const inp = document.getElementById('manual-customer-name');
    const hid = document.getElementById('customer-select');
    const phoneHid = document.getElementById('customer-phone');
    const dropdown = document.getElementById('customer-dropdown');
    if (inp) inp.value = name;
    if (hid) hid.value = id;
    if (phoneHid) {
      const c = App.state.customers.find(x => String(x.id) === String(id));
      phoneHid.value = c?.phone || '';
    }
    if (dropdown) dropdown.style.display = 'none';
  },
  handlePaymentMethodChange(method) {
    const cashSection = document.getElementById('cash-section');
    const transferSection = document.getElementById('transfer-section');
    const cashInput = document.getElementById('cash-received');
    const transferInput = document.getElementById('transfer-received');
    const confirmBtn = document.getElementById('confirm-payment-btn');
    const errorDiv = document.getElementById('cash-error');
    const nonCreditRows = document.getElementById('non-credit-rows');

    if (errorDiv) errorDiv.classList.add('hidden');
    if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.classList.remove('opacity-50','cursor-not-allowed'); }

    const subtotal = this.state.cart.reduce((s,i) => s + i.price * i.qty, 0);
    const total = subtotal - (this.state.discount || 0);

    // Build up to 4 quick-amount pills: all round-10k values from first→cap, sampled to max 4
    const _buildPills = (inputId, pillsId) => {
      const pillsEl = document.getElementById(pillsId);
      if (!pillsEl) return;
      const step = 10000;
      const first = Math.ceil((total + 1) / step) * step;
      const cap   = Math.ceil((total + 1) / 100000) * 100000;
      // All candidates from first to cap inclusive
      const all = [];
      for (let v = first; v <= cap; v += step) all.push(v);
      // Pick up to 4: always include first and cap, sample middle evenly
      let picks;
      if (all.length <= 4) {
        picks = all;
      } else {
        // Always first, last, and 2 evenly spaced in between
        const mid1 = all[Math.round((all.length - 1) / 3)];
        const mid2 = all[Math.round((all.length - 1) * 2 / 3)];
        picks = [first, mid1, mid2, cap];
      }
      pillsEl.innerHTML = `<div class="flex gap-1.5 justify-end w-full">${picks.map(a =>
        `<button type="button"
          onclick="document.getElementById('${inputId}').value=${a};App.validateCashInput();"
          class="px-2.5 py-1 rounded-full text-xs font-bold bg-green-50 border border-green-300 text-green-700 hover:bg-green-600 hover:text-white transition">
          ${fmt.currency(a)}
        </button>`
      ).join('')}</div>`;
    };

    if (method === 'credit') {
      if (cashSection) cashSection.style.display = 'none';
      if (transferSection) transferSection.style.display = 'none';
      if (cashInput) cashInput.value = '';
      if (transferInput) transferInput.value = '';
      if (nonCreditRows) nonCreditRows.style.display = 'none';
    } else {
      if (nonCreditRows) nonCreditRows.style.display = '';
      if (method === 'cash_transfer') {
        if (cashSection) cashSection.style.display = 'block';
        if (transferSection) transferSection.style.display = 'block';
        if (cashInput) cashInput.value = '';
        if (transferInput) transferInput.value = '';
        _buildPills('cash-received', 'cash-quick-pills');
        _buildPills('transfer-received', 'transfer-quick-pills');
      } else if (method === 'Transfer') {
        if (cashSection) cashSection.style.display = 'none';
        if (transferSection) transferSection.style.display = 'block';
        if (cashInput) cashInput.value = '';
        _buildPills('transfer-received', 'transfer-quick-pills');
        if (transferInput) transferInput.value = total;
      } else { // cash
        if (cashSection) cashSection.style.display = 'block';
        if (transferSection) transferSection.style.display = 'none';
        if (transferInput) transferInput.value = '';
        _buildPills('cash-received', 'cash-quick-pills');
        if (cashInput) cashInput.value = total;
      }
      this.validateCashInput();
    }
  },
  validateCashInput() {
    const errorDiv = document.getElementById('cash-error');
    const confirmBtn = document.getElementById('confirm-payment-btn');

    // 1. Remove the blocking logic. Hide any errors and enable the Confirm button
    // regardless of whether the entered amount is higher, lower, or exact.
    if (errorDiv) {
      errorDiv.classList.add('hidden');
    }
    if (confirmBtn) {
      confirmBtn.disabled = false;
      confirmBtn.classList.remove('opacity-50', 'cursor-not-allowed');
    }

    // 2. Trigger the math to instantly update the change/debt display
    this.calculateChange();
  },
  handleDiscountInput(value) {
    this.state.discount = Math.max(0, parseFloat(value)||0);
    this.calculateChange();
    const totalEl = document.getElementById('grand-total-display');
    const subtotal = this.state.cart.reduce((s,i)=>s+i.price*i.qty,0);
    if (totalEl) totalEl.textContent = fmt.currency(subtotal - this.state.discount);
  },
  calculateChange() {
    const subtotal = this.state.cart.reduce((s,i) => s + i.price * i.qty, 0);
    const total = subtotal - this.state.discount;

    // 1. Get values from both inputs
    const cash = parseFloat(document.getElementById('cash-received')?.value || 0);
    const transfer = parseFloat(document.getElementById('transfer-received')?.value || 0);
    
    // 2. Calculate the difference
    const received = cash + transfer;
    const diff = received - total;

    // 3. Update the display
    const el = document.getElementById('change-display');
    if (el) {
      // If diff > 0, it's "Change" (positive)
      // If diff < 0, it's "Debt/Remaining" (negative)
      // If diff == 0, it's 0
      el.innerHTML = fmt.currency(diff);
      
      // Optional: Style it red if they still owe money (negative)
      el.className = diff < 0 ? 'text-red-600 font-bold' : 'text-green-600 font-bold';
    }
    
    const totalEl = document.getElementById('grand-total-display');
    if (totalEl) totalEl.textContent = fmt.currency(total);
  },
  confirmPayment() {
    const isEditing = !!this._int.editingSaleBillNo;
    const subtotal = this.state.cart.reduce((s,i)=>s+i.price*i.qty,0);
    const total = subtotal - this.state.discount;
    const manualName = (document.getElementById('manual-customer-name')?.value.trim())
      || this._int._pendingCustomerName
      || '';
    const custId = document.getElementById('customer-select')?.value;
    let customerName = this.t('walkInCustomer'), customerId = '';
    const storedPhone = document.getElementById('customer-phone')?.value || '';
    let customerPhone = storedPhone;
    if (manualName) {
      customerName = manualName;
      if (!customerPhone) {
        const _mc = this.state.customers.find(x => x.name === manualName);
        if (_mc) { customerId = _mc.id; customerPhone = _mc.phone || ''; }
      }
    } else if (custId && custId !== 'walkin') {
      const c = this.state.customers.find(x => String(x.id) === String(custId));
      if (c) { customerName = c.name; customerId = c.id; customerPhone = customerPhone || c.phone || ''; }
    }
    const cashReceived = parseFloat(document.getElementById('cash-received')?.value||0);
    const transferReceived = parseFloat(document.getElementById('transfer-received')?.value||0);
    const change = (cashReceived + transferReceived) - total;
    const paymentMethod = document.getElementById('payment-method-select')?.value || 'cash';
    const notes = document.getElementById('payment-notes')?.value.trim() || '';
    const sale = {
      billNo: isEditing ? this._int.editingSaleBillNo : 'B' + Date.now(),
      date: isEditing ? this._int.originalSaleData.date : new Date().toISOString(),
      customer: customerName, customerId, customerPhone,
      paymentMethod,
      items: this.state.cart.map(item => {
        // Calculate stockQty (base units) so the server deducts the right amount
        const stockQty = item.weightItem
          ? item.qty
          : item.selectedUnit === 'box'  ? item.qty * (item.qtyInBox  || 1)
          : item.selectedUnit === 'pack' ? item.qty * (item.qtyInPack || 1)
          : item.qty;
        const _sel = item.selectedUnit || 'base';
        const _unitRaw = _sel === 'box'  ? (item.boxUnit  || item.baseUnit || item.unit || '')
                       : _sel === 'pack' ? (item.packUnit || item.baseUnit || item.unit || '')
                       : (item.baseUnit || item.unit || '');
        return {
          id:           item.id,
          name:         item.name,
          price:        item.price,
          qty:          item.qty,
          stockQty:     stockQty,
          selectedUnit: _sel,
          unitRaw:      _unitRaw,
          barcode:      item.barcode,
          unit:         item.unit,
          category:     item.category,
        };
      }),
      subtotal, discount: this.state.discount,
      discountCode: this.state.discountCode || '',
      discountId: this.state.appliedDiscount?.id || '',
      total, cashReceived,transferReceived, change, notes,
      cashier: this.state.currentUser?.name || '',
      latestEditDate: new Date().toISOString(),
    };
    if (isEditing) this.updateSale(sale);
    else this.addSale(sale);
    this._int.paymentModal = false;
    this.showReceipt(sale);
    this._int.originalSaleData = null;
    this.clearCart();
  },


  /* ── RECEIPT ── */
  showReceipt(sale) { this._int.reprintSale = sale; this.render(); },
  hideReceipt() { this._int.reprintSale = null; this.render(); },

  /* ── DELETE CONFIRM ── */
  showDeleteConfirm(type, id, label) {
    this._int.deleteConfirm = { type, id, label };
    this.render();
  },
  async confirmDelete() {
    if (!this._int.deleteConfirm) return;
    const { type, id } = this._int.deleteConfirm;
    try {
      if (type === 'product') await this.deleteProductConfirmed(id);
      else if (type === 'customer') await this.deleteCustomerConfirmed(id);
      else if (type === 'sale') await this.deleteSaleConfirmed(id);
      else if (type === 'discount') await this.deleteDiscountConfirmed(id);
      else if (type === 'purchase') await this.deletePurchaseConfirmed(id);
      else if (type === 'expense') await this.deleteExpenseConfirmed(id);
      else if (type === 'supplier') await this.deleteSupplierConfirmed(id);
      else if (type === 'user') { await this.run('deleteUser', id); this._int.users = await this.run('getUsers'); this._int.deleteConfirm = null; this.render(); }
    } catch(err) {
      console.error('confirmDelete error:', err);
      alert('Delete error: ' + (err.message || err));
    }
  },
};

// ─── PWA: Replace google.script.run with fetch() ─────────────
App.run = function(fn, ...args) {
  const apiUrl = localStorage.getItem('mahasap_api_url') || GAS_API_URL;
  if (!apiUrl) {
    return Promise.reject(new Error('API URL not configured.'));
  }
  // Use text/plain Content-Type to avoid CORS preflight with GAS
  // GAS only supports GET/POST and doesn't handle OPTIONS preflight
  return fetch(apiUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ fn, args }),
    redirect: 'follow',
  })
  .then(res => res.text())
  .then(text => {
    const data = JSON.parse(text);
    if (data.error) throw new Error(data.error);
    return data.result;
  });
};

<script>
// ═══ APP SHELL ═════════════════════════════════════════════════
Object.assign(App, {
  /* ─────────────── ROUTING & STATE MANAGEMENT ─────────────── */
  async setCurrentPage(page) {
    if (!this.isAdmin() && ['promotions','users','settings','expenses','suppliers'].includes(page)) return;

    this.state.currentPage = page;
    if (page === 'sell') {
      this._int._sellPageFreshLoad = true;
      this._searchFocusedByRealUser = false;
      this.state.searchQuery = '';
    }
    this.state.isSidebarOpen = false;

    // ── Data loading for pages that need it ──
    const needsSales = ['saleRecord', 'reprint'].includes(page);
    const needsPurchases = page === 'purchases';
    if (needsSales || needsPurchases) {
      this.state.pageLoading = true;
      this.render();
      try {
        if (needsSales) await this.ensureSalesLoaded();
        if (needsPurchases) await this.ensurePurchasesLoaded();
      } catch(e) { alert('Load failed: ' + (e.message || e)); }
      this.state.pageLoading = false;
    }
    if (page === 'shift') await this.loadShiftData();
    if (page === 'reports') {
      this.state.pageLoading = true;
      this.render();
      this.state.reportData = await this.run('getReportData');
      if (this._int.reportTab === 'profit') {
        this._int.profitReport = await this.run('getProfitReport', this._int.profitDateFrom || '', this._int.profitDateTo || '');
      }
      this.state.pageLoading = false;
    }
    if (page === 'users' && this.isAdmin()) {
      this._int.users = await this.run('getUsers');
    }

    this.render();
  },


  /* ─────────────── RENDER ─────────────── */
  render() {
    window._editSale = (billNo) => this.editSale(billNo);
    const root = document.getElementById('app-root');
    if (!root) return;

    // 1. Retrieve the saved sidebar scroll position
    const savedScroll = this._int.navScroll || 0;

    // 2. Save <main> scroll before rebuild — so mobile doesn't jump to top on re-render.
    const savedPage = this._int._lastRenderedPage;
    const currentPage = this.state.currentPage;
    const savedMainScroll = (savedPage === currentPage) ? (this._int._mainScroll || 0) : 0;
    this._int._lastRenderedPage = currentPage;
    if (savedPage !== currentPage) {
      this._int._mainScroll = 0; 
      this._int._sellPageFreshLoad = true;
      this._searchFocusedByRealUser = false;
    }

    const isAdmin = this.isAdmin(); 
    
    const pages = ['sell', 'saleRecord', 'reprint', 'purchases', 'credit', 'shift', 'reports', 'products', 'customers'];
    if (isAdmin) pages.push('suppliers', 'promotions', 'adjustStock', 'expenses', 'kpi', 'users');

    const navIcons = {
      sell: '🛒', 
      saleRecord: '📜', 
      reprint: '🖨️', 
      purchases: '📥', 
      credit: '💳',
      shift: '🗃️',
      reports: '📊', 
      products: '📦', 
      customers: '🧑', 
      suppliers: '🏭',
      promotions: '🎫', 
      adjustStock: '🔧',
      expenses: '💸',
      kpi: '📈',
      users: '👤'
    };

    root.innerHTML = `
    <div class="fixed inset-0 bg-black bg-opacity-50 z-30 lg:hidden transition-opacity ${this.state.isSidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}" onclick="App.toggleSidebar(false)"></div>
    
    <div class="fixed lg:relative inset-y-0 left-0 bg-gray-900 text-white w-60 flex-shrink-0 flex flex-col z-40 transform transition-transform ${this.state.isSidebarOpen ? 'translate-x-0' : '-translate-x-full'} lg:translate-x-0">
      <div class="px-3 pt-3 pb-2 border-b border-gray-700">
        <div class="flex items-center justify-between">
          <button onclick="App.logout()" title="${this.t('logout')}" class="p-1.5 rounded-lg text-white hover:text-red-400 hover:bg-gray-800 transition-colors leading-none"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg></button>
          <div class="text-center">
            <h1 class="text-xl font-bold text-green-400">${this.t('shopName')}</h1>
          </div>
          <div class="relative">
            <button onclick="App._int.langDropdown = !App._int.langDropdown; App.render()" title="Language" class="p-1.5 rounded-lg text-gray-400 hover:text-green-400 hover:bg-gray-800 transition-colors text-xl leading-none">🌐</button>
            ${this._int.langDropdown ? `
            <div onclick="App._int.langDropdown = false; App.render()" class="fixed inset-0 z-40"></div>
            <div class="absolute right-0 top-full mt-1 bg-gray-800 border border-gray-700 rounded-lg shadow-xl z-50 overflow-hidden min-w-[90px]">
              <button onclick="App.setLanguage('en'); App._int.langDropdown = false;" class="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-gray-700 transition-colors ${this.state.language === 'en' ? 'text-green-400 font-semibold' : 'text-gray-200'}">
                <span>🇬🇧</span><span>EN</span>${this.state.language === 'en' ? '<span class="ml-auto text-white">✓</span>' : ''}
              </button>
              <button onclick="App.setLanguage('lo'); App._int.langDropdown = false;" class="w-full flex items-center gap-2 px-3 py-2 text-sm hover:bg-gray-700 transition-colors ${this.state.language === 'lo' ? 'text-green-400 font-semibold' : 'text-gray-200'}">
                <span>🇱🇦</span><span>ລາວ</span>${this.state.language === 'lo' ? '<span class="ml-auto text-green-400">✓</span>' : ''}
              </button>
            </div>
            ` : ''}
          </div>
        </div>
        <p class="text-xs text-center text-gray-400 mt-1">${this.state.currentUser?.name || ''} · ${this.state.currentUser?.role || ''}</p>
      </div>
      
      <nav id="sidebar-nav" class="flex-grow p-3 overflow-y-auto" onscroll="App._int.navScroll = this.scrollTop">
        <ul class="space-y-1">
          ${pages.map(p => `
          <li>
            <button onclick="App.setCurrentPage('${p}')" class="w-full flex items-center gap-3 text-left p-2.5 rounded-lg transition-colors ${this.state.currentPage === p ? 'bg-green-600 text-white' : 'hover:bg-gray-600 text-gray-200'}">
              <span class="text-lg">${navIcons[p] || '•'}</span>
              <span>${this.t(p) || p}</span>
            </button>
          </li>
          `).join('')}
        </ul>
      </nav>
    </div>
    
    <div class="flex-1 flex flex-col max-w-full overflow-hidden">
      <header class="bg-green-600 text-white shadow-md p-1 flex items-center justify-between lg:hidden">
        <button onclick="App.toggleSidebar(true)" class="p-2 text-xl">☰</button>
        <h2 class="text-lg font-bold truncate">${this.t(this.state.currentPage)}</h2>
        <div class="w-10"></div>
      </header>
      <main class="flex-1 overflow-y-auto" onscroll="if(!App._int._pauseScrollTrack)App._int._mainScroll=this.scrollTop">${this.renderPage()}</main>
    </div>
    
    ${this._int.paymentModal ? this.renderPaymentModal() : ''}
    ${this._int.productModal ? this.renderProductModal() : ''}
    ${this._int.customerModal ? this.renderCustomerModal() : ''}
    ${this._int.discountModal ? this.renderDiscountModal() : ''}
    ${this._int.purchaseModal ? this.renderPurchaseModal() : ''}    
    ${this._int.userModal ? this.renderUserModal() : ''}
    ${this._int.expenseModal ? this.renderExpenseModal() : ''}
    ${this._int.supplierModal ? this.renderSupplierModal() : ''}
    ${this._int.scannerModal ? this.renderScannerModal() : ''}
    ${this._int.reprintSale ? this.renderReceiptModal(this._int.reprintSale) : ''}
    ${this._int.deleteConfirm ? this.renderDeleteConfirmModal() : ''}
    `;

    // 3. Restore scroll positions after the DOM updates
    const newNav = document.getElementById('sidebar-nav');
    if (newNav) newNav.scrollTop = savedScroll;

    // 4. Restore <main> scroll
    const newMain = root.querySelector('main');
    if (newMain && savedMainScroll > 0) {
      this._int._pauseScrollTrack = true;
      newMain.scrollTop = savedMainScroll;
      setTimeout(() => { this._int._pauseScrollTrack = false; }, 50);
    }

    // 5. Secure focus execution loop
    if (this.state.currentPage === 'sell') {
      const isPageChange = (savedPage !== currentPage);
      setTimeout(() => {
        if (typeof App._attachScanFocusGuard === 'function') App._attachScanFocusGuard();
        App._hwRefocus(isPageChange);
      }, 50);
    }
  },
  
  renderPage() {
    switch(this.state.currentPage) {
      case 'sell':        return this.renderSellPage();
      case 'saleRecord':  return this.renderSaleRecordPage();
      case 'reprint':     return this.renderReprintPage();
      case 'products':    return this.renderProductsPage();
      case 'customers':   return this.renderCustomersPage();
      case 'reports':     return this.renderReportsPage();
      case 'adjustStock': return this.renderAdjustStockPage();
      case 'promotions':  return this.renderPromotionsPage();
      case 'purchases':   return this.renderPurchasesPage();
      case 'credit':      return this.renderCreditPage();
      case 'shift':       return this.renderShiftPage();
      case 'expenses':    return this.renderExpensesPage();
      case 'suppliers':   return this.renderSuppliersPage();
      case 'kpi':         return this.renderKpiPage();
      case 'users':       return this.renderUsersPage();
      default:            return this.renderSellPage();
    }
  },

  /* ─────────────── BULLETPROOF HARDWARE SCANNER FOCUS GUARD ─────────────── */
  _hwRefocus(forcePageLoad = false) {
    if (this.state.currentPage !== 'sell') return;
    
    // Protect modal window forms from losing text focus
    if (this._int.paymentModal || this._int.productModal || this._int.customerModal || 
        this._int.discountModal || this._int.purchaseModal || this._int.userModal || 
        this._int.expenseModal || this._int.supplierModal || this._int.scannerModal || 
        this._int.reprintSale || this._int.deleteConfirm) {
      return;
    }

    const hw = document.getElementById('hw-barcode-input');
    if (!hw) return;

    // If it's a fresh route transition, instantly override and focus the hidden input field
    if (forcePageLoad || this._int._sellPageFreshLoad) {
      this._int._sellPageFreshLoad = false;
      this._searchFocusedByRealUser = false;
      hw.focus({ preventScroll: true });
      return;
    }

    const ae = document.activeElement;
    const isCustomerInput = ae && ae.classList.contains('cart-customer-name-inp');
    const isSearchInput = ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === this.t('searchProducts'));
    const isOtherInput = ae && (ae.tagName === 'SELECT' || ae.tagName === 'TEXTAREA' || ae.closest('.modal'));

    // Critical Override: If focused on search input box via background rendering rather than physical click, snap back
    if (isSearchInput && !this._searchFocusedByRealUser) {
      hw.focus({ preventScroll: true });
      return;
    }

    if (!isCustomerInput && !isSearchInput && !isOtherInput) {
      hw.focus({ preventScroll: true });
    }
  },

  _attachScanFocusGuard() {
    if (window._scanGuardInitialized) return;
    window._scanGuardInitialized = true;

    // Monitor real human hardware interactions vs automated browser focus layout shifts
    document.addEventListener('mousedown', (e) => {
      const ae = e.target;
      if (ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === App.t('searchProducts'))) {
        App._searchFocusedByRealUser = true;
      } else {
        if (ae && !ae.classList.contains('cart-customer-name-inp') && ae.id !== 'hw-barcode-input') {
          App._searchFocusedByRealUser = false;
        }
      }
    }, true);

    document.addEventListener('touchstart', (e) => {
      const ae = e.target;
      if (ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === App.t('searchProducts'))) {
        App._searchFocusedByRealUser = true;
      }
    }, true);

    document.addEventListener('input', (e) => {
      const ae = e.target;
      if (ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === App.t('searchProducts'))) {
        App._searchFocusedByRealUser = true;
      }
    }, true);

    document.addEventListener('click', (e) => {
      if (App.state.currentPage !== 'sell') return;
      setTimeout(() => {
        const ae = document.activeElement;
        const isCustomerInput = ae && ae.classList.contains('cart-customer-name-inp');
        const isSearchInput = ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === App.t('searchProducts'));
        
        if (isSearchInput && !App._searchFocusedByRealUser) {
          App._hwRefocus(true);
          return;
        }
        if (!isCustomerInput && !isSearchInput) {
          App._hwRefocus();
        }
      }, 30);
    }, true);

    document.addEventListener('focusin', (e) => {
      if (App.state.currentPage !== 'sell') return;
      setTimeout(() => {
        const ae = document.activeElement;
        const isCustomerInput = ae && ae.classList.contains('cart-customer-name-inp');
        const isSearchInput = ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input' || ae.placeholder === App.t('searchProducts'));
        
        if (isSearchInput && !App._searchFocusedByRealUser) {
          App._hwRefocus(true);
          return;
        }
        if (!isCustomerInput && !isSearchInput) {
          App._hwRefocus();
        }
      }, 30);
    }, true);

    window.addEventListener('focus', () => {
      if (App.state.currentPage === 'sell') {
        App._hwRefocus();
      }
    });
  }
});
</script>
<script>
// ═══ PAGE: SELL ════════════════════════════════════════════════
Object.assign(App, {
  /* ─── SELL PAGE ─── */
  renderSellPage() {
    const grandTotal = this.state.cart.reduce((s,i)=>s+i.price*i.qty,0);
    const q = this.state.searchQuery.trim().toLowerCase();
    const categories = ['all', ...new Set(this.state.products.map(p=>p.category).filter(Boolean))];
    const selCat = this._int.selectedCategory || 'all';
    const isEditing = !!this._int.editingSaleBillNo;

      return matchCat && matchQ;
    });

    // Cart HTML rendered by _patchCart (called after DOM ready via setTimeout)
