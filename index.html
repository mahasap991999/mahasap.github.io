    `;
  },

  // Helper exposed for inline oninput use
  _fmt_currency(v) { return fmt.currency(v); },
});
</script>
<script>
// ═══ PAGE: REPORTS ═════════════════════════════════════════════
Object.assign(App, {
  /* ─── REPORTS PAGE ─── */
  renderReportsPage() {
    const { reportData } = this.state;
    if (!reportData || this.state.pageLoading) return `<div class="p-6 text-center">${this.t('loading')}</div>`;
    const tab = this._int.reportTab || 'summary';
    const pr = this._int.profitReport;

    /* ── Helper: compute totals for a date range from byDay data ── */
    const sumRange = (from, to) => {
      return Object.entries(reportData.byDay || {}).reduce((acc, [key, val]) => {
        const parts = key.split('/');
        const d = new Date(parts[2], parts[1] - 1, parts[0]);
        if (d >= from && d <= to) acc += val;
        return acc;
      }, 0);
    };

    const now = new Date();
    const startOfDay = d => { const x = new Date(d); x.setHours(0,0,0,0); return x; };
    const endOfDay   = d => { const x = new Date(d); x.setHours(23,59,59,999); return x; };

    const todayStart    = startOfDay(now);
    const ydayStart     = startOfDay(new Date(now - 86400000));
    const dayOfWeek     = (now.getDay() + 6) % 7;
    const thisWeekStart = startOfDay(new Date(now - dayOfWeek * 86400000));
    const lastWeekStart = startOfDay(new Date(thisWeekStart - 7 * 86400000));
    const lastWeekEnd   = new Date(thisWeekStart - 1);
    const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1);
    const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    const lastMonthEnd   = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59, 999);
    const lastYearStart  = new Date(now.getFullYear() - 1, 0, 1);
    const lastYearEnd    = new Date(now.getFullYear() - 1, 11, 31, 23, 59, 59, 999);

    const todayVal     = sumRange(todayStart, endOfDay(now));
    const ydayVal      = sumRange(ydayStart, endOfDay(ydayStart));
    const thisWeekVal  = sumRange(thisWeekStart, endOfDay(now));
    const lastWeekVal  = sumRange(lastWeekStart, lastWeekEnd);
    const thisMonthVal = sumRange(thisMonthStart, endOfDay(now));
    const lastMonthVal = sumRange(lastMonthStart, lastMonthEnd);
    const thisYearVal  = reportData.yearly || 0;
    const lastYearVal  = sumRange(lastYearStart, lastYearEnd);

    const deltaBadge = (curr, prev) => {
      if (!prev) return `<span class="text-xs text-gray-400 ml-1">—</span>`;
      const pct = ((curr - prev) / prev * 100).toFixed(1);
      const up = curr >= prev;
      return `<span class="inline-flex items-center gap-0.5 text-xs font-semibold px-1.5 py-0.5 rounded-full ml-1 ${up?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}">${up?'▲':'▼'} ${Math.abs(pct)}%</span>`;
    };

    const cmpCard = (label, currLabel, currVal, prevLabel, prevVal, color) => `
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 flex flex-col gap-2">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide">${label}</p>
        <div class="flex items-baseline gap-2 flex-wrap">
          <span class="text-xl font-bold text-${color}-700">${fmt.currency(currVal)}</span>
          ${deltaBadge(currVal, prevVal)}
        </div>
        <div class="flex items-center justify-between text-xs text-gray-500 mt-1 border-t pt-2 gap-2">
          <span class="font-medium text-gray-600">${currLabel}</span>
          <span class="text-right">${prevLabel}: <strong class="text-gray-700">${fmt.currency(prevVal)}</strong></span>
        </div>
      </div>`;

    /* ─────────────── SUMMARY TAB ─────────────── */
    const summaryTab = `
    <div class="grid grid-cols-2 xl:grid-cols-4 gap-3 mb-5">
      ${cmpCard(this.t('dailyTotal')||'Daily', 'Today', todayVal, 'Yesterday', ydayVal, 'green')}
      ${cmpCard('Weekly', 'This Week', thisWeekVal, 'Last Week', lastWeekVal, 'blue')}
      ${cmpCard(this.t('monthlyTotal')||'Monthly', 'This Month', thisMonthVal, 'Last Month', lastMonthVal, 'purple')}
      ${cmpCard(this.t('yearlyTotal')||'Yearly', 'This Year', thisYearVal, 'Last Year', lastYearVal, 'amber')}
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <h4 class="font-bold text-sm text-gray-700 mb-3">💳 ${this.t('paymentBreakdown')||'Payment Breakdown'}</h4>
        ${Object.entries(reportData.paymentBreakdown||{}).map(([pm,total])=>`
          <div class="flex justify-between py-1 border-b text-sm last:border-0">
            <span class="capitalize text-gray-600">${this.t(pm)||pm}</span>
            <span class="font-bold text-gray-800">${fmt.currency(total)}</span>
          </div>`).join('')||`<p class="text-gray-400 text-sm">${this.t('noData')}</p>`}
        <div class="flex items-center gap-4 mt-4">
          <canvas id="chart-payment" style="width:110px;height:110px;flex-shrink:0"></canvas>
          <div id="legend-payment" class="flex flex-col gap-1.5 text-xs flex-1 min-w-0"></div>
        </div>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <h4 class="font-bold text-sm text-gray-700 mb-3">🏷️ ${this.t('byCategory')||'By Category'}</h4>
        ${Object.entries(reportData.byCategory||{}).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([cat,total])=>`
          <div class="flex justify-between py-1 border-b text-sm last:border-0">
            <span class="text-gray-600 truncate mr-2">${cat}</span>

        <div class="mt-3" style="overflow:hidden">
          <canvas id="chart-category" style="width:100%;display:block"></canvas>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">

        <span class="text-xs font-normal text-gray-400 ml-1">(last 30 days)</span></h4>

    /* ─────────────── TOP PRODUCTS TAB ─────────────── */
    const topProductsTab = `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto mb-4">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="p-3 text-left text-gray-500 font-semibold text-xs uppercase">#</th>
            <th class="p-3 text-left text-gray-500 font-semibold text-xs uppercase">${this.t('productName')||'Product'}</th>
            <th class="p-3 text-right text-gray-500 font-semibold text-xs uppercase">${this.t('qty')||'Qty'}</th>
            <th class="p-3 text-right text-gray-500 font-semibold text-xs uppercase">${this.t('total')||'Total'}</th>
          </tr>
        </thead>
        <tbody>
          ${(reportData.topProducts||[]).map((p,i)=>`
            <tr class="border-t hover:bg-gray-50">
              <td class="p-3 font-bold text-gray-400">${i+1}</td>
              <td class="p-3 font-medium text-gray-800">${p.name}</td>
              <td class="p-3 text-right text-gray-600">${fmt.number(p.qty)}</td>
              <td class="p-3 text-right font-bold text-green-700">${fmt.currency(p.revenue)}</td>
            </tr>`).join('')||`<tr><td colspan="4" class="p-6 text-center text-gray-400">${this.t('noData')}</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <h4 class="font-bold text-sm text-gray-700 mb-3">📊 ${this.t('topProducts')||'Top Products'}</h4>
      <div style="overflow:hidden">
        <canvas id="chart-topproducts" style="width:100%;display:block"></canvas>
      </div>
    </div>`;

    /* ─────────────── BY DAY TAB ─────────────── */
    const byDayTab = `
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-x-auto mb-4">
      <table class="w-full text-sm">
        <thead class="bg-gray-50">
          <tr>
            <th class="p-3 text-left text-gray-500 font-semibold text-xs uppercase">${this.t('date')||'Date'}</th>
            <th class="p-3 text-right text-gray-500 font-semibold text-xs uppercase">${this.t('total')||'Total'}</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(reportData.byDay||{}).sort((a,b)=>new Date(b[0].split('/').reverse().join('-'))-new Date(a[0].split('/').reverse().join('-'))).map(([date,total])=>`
            <tr class="border-t hover:bg-gray-50">
              <td class="p-3 text-gray-700">${date}</td>
              <td class="p-3 text-right font-bold text-green-700">${fmt.currency(total)}</td>
            </tr>`).join('')||`<tr><td colspan="2" class="p-6 text-center text-gray-400">${this.t('noData')}</td></tr>`}
        </tbody>
      </table>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
      <h4 class="font-bold text-sm text-gray-700 mb-2">📅 ${this.t('salesByDay')||'Sales by Day'}</h4>
      <div style="overflow-x:auto">
        <canvas id="chart-byday2" style="min-width:480px;width:100%;display:block"></canvas>
      </div>
    </div>`;

    /* ─────────────── PROFIT TAB ─────────────── */
    const profitTab = pr ? `
    <div class="flex flex-wrap gap-2 mb-4 items-end">
      <div>
        <label class="text-xs text-gray-500 block mb-1">${this.t('date')||'Date'} from</label>
        <input type="date" value="${this._int.profitDateFrom||''}" onchange="App._int.profitDateFrom=this.value" class="border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <div>
        <label class="text-xs text-gray-500 block mb-1">${this.t('date')||'Date'} to</label>
        <input type="date" value="${this._int.profitDateTo||''}" onchange="App._int.profitDateTo=this.value" class="border rounded-lg p-2 text-sm outline-none focus:ring-2 focus:ring-green-400">
      </div>
      <button onclick="App.loadProfitReport()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-bold hover:bg-green-700">${this.t('search')||'Search'}</button>
    </div>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 border-l-4 border-green-500">
        <p class="text-xs text-gray-400 uppercase font-semibold">${this.t('revenue')||'Revenue'}</p>
        <p class="text-lg font-bold text-green-700 mt-1 break-all">${fmt.currency(pr.totalRevenue)}</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 border-l-4 border-orange-400">
        <p class="text-xs text-gray-400 uppercase font-semibold">${this.t('purchaseCost')||'Purchase Cost'}</p>
        <p class="text-lg font-bold text-orange-600 mt-1 break-all">${fmt.currency(pr.totalPurchaseCost)}</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 border-l-4 border-red-400">
        <p class="text-xs text-gray-400 uppercase font-semibold">${this.t('expenses')||'Expenses'}</p>
        <p class="text-lg font-bold text-red-600 mt-1 break-all">${fmt.currency(pr.totalExpenses)}</p>
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4 border-l-4 border-blue-500">
        <p class="text-xs text-gray-400 uppercase font-semibold">${this.t('grossProfit')||'Gross Profit'}</p>
        <p class="text-lg font-bold text-blue-700 mt-1 break-all">${fmt.currency(pr.grossProfit)}</p>
      </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 mb-4 flex items-center gap-4">
      <div class="min-w-0">
        <p class="text-xs text-gray-400 uppercase font-semibold mb-1">${this.t('netProfit')||'Net Profit'}</p>
        <p class="text-3xl font-bold ${pr.netProfit>=0?'text-green-700':'text-red-600'} break-all">${fmt.currency(pr.netProfit)}</p>
      </div>
      <div class="ml-auto text-4xl flex-shrink-0">${pr.netProfit>=0?'📈':'📉'}</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <h4 class="font-bold text-sm text-gray-700 mb-2">${this.t('expenses')||'Expenses'} ${this.t('byCategory')||'by Category'}</h4>
        ${Object.entries(pr.expenseByCategory||{}).map(([cat,amt])=>`
          <div class="flex justify-between py-1.5 border-b text-sm last:border-0">

          </div>`).join('')||`<p class="text-gray-400 text-sm">${this.t('noData')}</p>`}
      </div>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
        <h4 class="font-bold text-sm text-gray-700 mb-3">💰 Profit Breakdown</h4>
        <div class="flex items-center gap-4">
          <canvas id="chart-profit" style="width:120px;height:120px;flex-shrink:0"></canvas>
          <div id="legend-profit" class="flex flex-col gap-2 text-xs flex-1 min-w-0"></div>
        </div>
      </div>
    </div>` : `
    <div class="p-10 text-center">
      <p class="text-gray-500 mb-4 text-sm">Set a date range and load the profit report.</p>
      <button onclick="App._int.reportTab='profit';App.loadProfitReport()" class="px-5 py-2.5 bg-green-600 text-white rounded-lg font-bold hover:bg-green-700">${this.t('profitReport')||'Load Profit Report'}</button>
    </div>`;

    /* ─────────────── TABS ─────────────── */
    const tabs = [
      ['summary',     '📊 Summary'],
      ['topProducts', '🏆 ' + (this.t('topProducts')||'Top Products')],

      ['profit',      '💰 ' + (this.t('profitReport')||'Profit')],
    ];

    const html = `
    <div class="p-4 max-w-5xl mx-auto">
      <h3 class="text-2xl font-bold mb-4 text-gray-800">${this.t('reports')||'Reports'}</h3>
      <div class="flex gap-1 mb-5 bg-gray-100 rounded-xl p-1 flex-wrap">

    setTimeout(() => App._drawReportCharts(tab, reportData, pr), 80);

  },

  /* ─── CHART DRAWING ─── */
  _drawReportCharts(tab, reportData, pr) {
    const COLORS = ['#16a34a','#2563eb','#7c3aed','#d97706','#db2877','#0891b2','#ea580c','#65a30d','#dc2626','#0d9488'];
    const DPR = window.devicePixelRatio || 1;

    /* ── Setup canvas for crisp HiDPI rendering ──
       Pass cssW/cssH in CSS pixels; function sets canvas buffer and returns ctx scaled. */
    const setupCanvas = (canvas, cssW, cssH) => {
      canvas.style.width  = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width  = Math.round(cssW  * DPR);
      canvas.height = Math.round(cssH * DPR);
      const ctx = canvas.getContext('2d');
      ctx.scale(DPR, DPR);
      return ctx;
    };

    /* ── Donut chart ── */
    const drawDonut = (canvasId, legendId, entries) => {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;
      const SIZE = 110;
      const ctx = setupCanvas(canvas, SIZE, SIZE);
      const total = entries.reduce((s,[,v])=>s+v, 0);
      if (!total) return;
      let angle = -Math.PI / 2;
      const cx = SIZE/2, cy = SIZE/2, r = SIZE/2 - 5;
      entries.forEach(([, val], i) => {
        const slice = (val / total) * Math.PI * 2;
        ctx.beginPath(); ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, angle, angle + slice);
        ctx.closePath();
        ctx.fillStyle = COLORS[i % COLORS.length];
        ctx.fill();
        angle += slice;
      });
      // hole
      ctx.beginPath(); ctx.arc(cx, cy, r * 0.54, 0, Math.PI * 2);
      ctx.fillStyle = '#fff'; ctx.fill();
      if (legendId) {
        const lg = document.getElementById(legendId);
        if (lg) lg.innerHTML = entries.map(([label, val], i) => `
          <div class="flex items-center gap-2 min-w-0">
            <div style="width:9px;height:9px;border-radius:2px;background:${COLORS[i%COLORS.length]};flex-shrink:0"></div>
            <span class="text-gray-600 truncate">${label}</span>
            <span class="font-bold ml-auto pl-1 whitespace-nowrap">${Math.round(val/total*100)}%</span>
          </div>`).join('');
      }
    };

    /* ── Horizontal bar chart ── */
    const drawHBar = (canvasId, entries) => {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      // Measure the widest value label first so we can size the canvas correctly
      const tmpCtx = document.createElement('canvas').getContext('2d');
      tmpCtx.font = '11px system-ui,sans-serif';
      const maxValLabel = entries.reduce((mx,[,v]) => {
        const w = tmpCtx.measureText(fmt.number(v)).width;
        return w > mx ? w : mx;
      }, 0);
      const maxNameLabel = entries.reduce((mx,[n]) => {
        const label = n.length > 15 ? n.slice(0,14)+'…' : n;
        const w = tmpCtx.measureText(label).width;
        return w > mx ? w : mx;
      }, 0);

      const barH  = 24, gap = 9, pad = 6;
      const labelW = Math.ceil(maxNameLabel) + 6;  // left name column
      const valGap = 6;                             // gap after bar before value
      const valW   = Math.ceil(maxValLabel) + 4;   // right value column
      const containerW = canvas.parentElement ? canvas.parentElement.offsetWidth : 360;
      const cssW = Math.max(containerW, 200);
      const cssH = entries.length * (barH + gap) + pad * 2;
      const ctx = setupCanvas(canvas, cssW, cssH);
      ctx.font = '11px system-ui,sans-serif';

      const availBar = cssW - labelW - pad - valGap - valW; // bar drawing area
      const maxVal = Math.max(1, ...entries.map(([,v])=>v));

      entries.forEach(([label, val], i) => {
        const y = pad + i * (barH + gap);
        const displayLabel = label.length > 15 ? label.slice(0,14)+'…' : label;
        const barW = Math.max(0, Math.round((availBar * val) / maxVal));

        // name label (right-aligned)
        ctx.fillStyle = '#374151';
        ctx.textBaseline = 'middle';
        ctx.textAlign = 'right';
        ctx.fillText(displayLabel, labelW, y + barH/2);

        // background track
        ctx.fillStyle = '#f3f4f6';
        ctx.beginPath(); ctx.roundRect(labelW + pad, y, availBar, barH, 4); ctx.fill();

        // filled bar
        if (barW > 0) {
          ctx.fillStyle = COLORS[i % COLORS.length];
          ctx.beginPath(); ctx.roundRect(labelW + pad, y, barW, barH, 4); ctx.fill();
        }

        // value label (left of value column, after bar)
        ctx.fillStyle = '#111827';
        ctx.textAlign = 'left';
        ctx.fillText(fmt.number(val), labelW + pad + barW + valGap, y + barH/2);
      });
    };

    /* ── Vertical bar chart ── */
    const drawVBar = (canvasId, labels, values, color='#16a34a', color2) => {
      const canvas = document.getElementById(canvasId);
      if (!canvas) return;

      // Measure widest Y-axis label
      const tmpCtx = document.createElement('canvas').getContext('2d');
      tmpCtx.font = '10px system-ui,sans-serif';
      const maxVal = Math.max(1, ...values);
      const yLabelW = [0.25,0.5,0.75,1].reduce((mx, f) => {
        const w = tmpCtx.measureText(fmt.number(Math.round(maxVal*f))).width;
        return w > mx ? w : mx;
      }, 0);

      const containerW = canvas.parentElement ? canvas.parentElement.offsetWidth : 560;
      const cssW = Math.max(containerW, 300);
      const cssH = 170;
      const padL  = Math.ceil(yLabelW) + 10;  // dynamic left padding
      const padR  = 10, padT = 16, padB = 28;
      const ctx = setupCanvas(canvas, cssW, cssH);
      ctx.font = '10px system-ui,sans-serif';

      const chartW = cssW - padL - padR;
      const chartH = cssH - padT - padB;
      const step = chartW / Math.max(values.length, 1);
      const barW = Math.max(3, Math.floor(step * 0.7));

      // Grid lines + Y labels
      [0.25, 0.5, 0.75, 1].forEach(f => {
        const y = padT + chartH * (1 - f);
        ctx.strokeStyle = '#e5e7eb'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(cssW - padR, y); ctx.stroke();
        ctx.fillStyle = '#9ca3af';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(fmt.number(Math.round(maxVal * f)), padL - 4, y);
      });

      // Bars + X labels
      const nth = Math.ceil(values.length / 16);
      values.forEach((val, i) => {
        const x = padL + i * step + (step - barW) / 2;
        const bh = chartH * (val / maxVal);
        const y  = padT + chartH - bh;
        ctx.fillStyle = (color2 && i % 2 === 1) ? color2 : color;
        ctx.globalAlpha = 0.88;
        if (bh > 0) { ctx.beginPath(); ctx.roundRect(x, y, barW, bh, [3,3,0,0]); ctx.fill(); }
        ctx.globalAlpha = 1;
        if (i % nth === 0 && labels[i]) {
          ctx.fillStyle = '#6b7280';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          ctx.fillText(labels[i], padL + i * step + step / 2, cssH - 6);
        }
      });
    };

    /* ── Dispatch per tab ── */
    if (tab === 'summary') {
      drawDonut('chart-payment', 'legend-payment',
        Object.entries(reportData.paymentBreakdown||{}).sort((a,b)=>b[1]-a[1]));
      drawHBar('chart-category',
        Object.entries(reportData.byCategory||{}).sort((a,b)=>b[1]-a[1]).slice(0,7));
      const days = Object.entries(reportData.byDay||{})
        .sort((a,b)=>new Date(a[0].split('/').reverse().join('-'))-new Date(b[0].split('/').reverse().join('-')))
        .slice(-30);
      drawVBar('chart-byday', days.map(([d])=>d.slice(0,5)), days.map(([,v])=>v), '#16a34a', '#22c55e');
    }
    if (tab === 'topProducts') {
      drawHBar('chart-topproducts',
        (reportData.topProducts||[]).slice(0,8).map(p=>[p.name, p.revenue]));
    }
    if (tab === 'byDay') {
      const days = Object.entries(reportData.byDay||{})
        .sort((a,b)=>new Date(a[0].split('/').reverse().join('-'))-new Date(b[0].split('/').reverse().join('-')));
      drawVBar('chart-byday2', days.map(([d])=>d.slice(0,5)), days.map(([,v])=>v), '#2563eb', '#3b82f6');
    }
    if (tab === 'profit' && pr) {
      drawDonut('chart-profit', 'legend-profit', [
        [this.t('revenue')||'Revenue',       pr.totalRevenue],
        [this.t('purchaseCost')||'Purchase', pr.totalPurchaseCost],
        [this.t('expenses')||'Expenses',     pr.totalExpenses],
      ].filter(([,v])=>v>0));
    }
  },
});
</script>

<script>
// ═══ PAGE: KPI ═════════════════════════════════════════════════
Object.assign(App, {

  /* ─── KPI PAGE ─── */
  renderKpiPage() {
    // If sales haven't been loaded yet, kick off the load and show a spinner.
    // ensureSalesLoaded() is idempotent — safe to call multiple times.
    if (!this.state._loaded.sales) {
      if (!this._int.kpiLoading) {
        this._int.kpiLoading = true;
        this.ensureSalesLoaded()
          .catch(e => alert('Failed to load sales: ' + (e.message || e)))
          .finally(() => { this._int.kpiLoading = false; this.render(); });
      }
      return `
        <div class="p-8 flex flex-col items-center justify-center gap-3 text-gray-500">
          <div class="animate-spin rounded-full h-10 w-10 border-4 border-green-600 border-t-transparent"></div>
          <span>${this.t('loading')}</span>
        </div>`;
    }

    const period = this._int.kpiPeriod || 'today';
    const now = new Date();

    // Date range helpers
    const startOf = {
      today:   () => { const d = new Date(now); d.setHours(0,0,0,0); return d; },
      week:    () => { const d = new Date(now); d.setDate(d.getDate() - d.getDay()); d.setHours(0,0,0,0); return d; },
      month:   () => new Date(now.getFullYear(), now.getMonth(), 1),
      custom:  () => this._int.kpiFrom ? new Date(this._int.kpiFrom) : new Date(0),
    };
    const endOf = {
      today:   () => new Date(now),
      week:    () => new Date(now),
      month:   () => new Date(now),
      custom:  () => this._int.kpiTo ? new Date(this._int.kpiTo + 'T23:59:59') : new Date(now),
    };

    const from = startOf[period]();
    const to   = endOf[period]();

    const inRange = s => {
      const d = new Date(s.date);
      return d >= from && d <= to;
    };

    const sales = this.state.sales.filter(inRange);

    // ── Aggregate per staff ──
    const staffMap = {};
    sales.forEach(s => {
      const name = s.cashier || 'Unknown';
      if (!staffMap[name]) {
        staffMap[name] = { name, revenue: 0, txCount: 0, discountGiven: 0, creditCount: 0, cashCount: 0, transferCount: 0, voidCount: 0, hourBuckets: {} };
      }
      const r = staffMap[name];
      if (s.change < 0) { r.voidCount++; return; }   // treat negative-change as void/return
      r.revenue       += s.total || 0;
      r.txCount       += 1;
      r.discountGiven += s.discount || 0;
      if (s.paymentMethod === 'credit')        r.creditCount++;
      else if (s.paymentMethod === 'Transfer') r.transferCount++;
      else                                     r.cashCount++;
      // hour bucket for activity chart
      const hr = new Date(s.date).getHours();
      r.hourBuckets[hr] = (r.hourBuckets[hr] || 0) + 1;
    });

    const staff = Object.values(staffMap).sort((a, b) => b.revenue - a.revenue);
    const totalRevenue = staff.reduce((s, r) => s + r.revenue, 0);
    const totalTx      = staff.reduce((s, r) => s + r.txCount, 0);
    const avgBasket    = totalTx ? totalRevenue / totalTx : 0;
    const topStaff     = staff[0];

    // ── Color palette per staff member (cycles) ──
    const palette = ['#16a34a','#2563eb','#7c3aed','#d97706','#db2777','#0891b2'];
    const colorOf  = i => palette[i % palette.length];

    // ── Hourly chart (0-23, all staff combined) ──
    const hourTotals = {};
    staff.forEach(r => {
      Object.entries(r.hourBuckets).forEach(([hr, cnt]) => {
        hourTotals[hr] = (hourTotals[hr] || 0) + cnt;
      });
    });
    const maxHour = Math.max(1, ...Object.values(hourTotals));
    const hourBars = Array.from({length: 24}, (_, h) => {
      const cnt = hourTotals[h] || 0;
      const pct = Math.round((cnt / maxHour) * 100);
      const active = cnt > 0;
      return `
        <div class="flex flex-col items-center gap-0.5" style="flex:1;min-width:0">
          <div class="w-full flex items-end" style="height:48px">
            <div style="width:100%;height:${pct}%;background:${active?'#16a34a':'#e5e7eb'};border-radius:2px 2px 0 0;min-height:${active?2:0}px"></div>
          </div>
          ${h % 3 === 0 ? `<span style="font-size:9px;color:#9ca3af">${h}</span>` : '<span style="height:13px"></span>'}
        </div>`;
    }).join('');

    // ── Per-staff rows ──
    const staffRows = staff.map((r, i) => {
      const share = totalRevenue ? Math.round((r.revenue / totalRevenue) * 100) : 0;
      const avgB  = r.txCount   ? r.revenue / r.txCount : 0;
      const color = colorOf(i);
      return `
      <tr class="border-b hover:bg-gray-50">
        <td class="p-2">
          <div class="flex items-center gap-2">
            <div style="width:28px;height:28px;border-radius:50%;background:${color};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0">${r.name.charAt(0).toUpperCase()}</div>
            <span class="font-medium text-sm">${r.name}</span>
            ${i === 0 && r.txCount > 0 ? `<span class="px-1.5 py-0.5 rounded text-xs" style="background:#fef3c7;color:#92400e">&#11088; Top</span>` : ''}
          </div>
        </td>
        <td class="p-2 text-right text-sm font-bold text-green-700">${fmt.currency(r.revenue)}</td>
        <td class="p-2 text-center text-sm">${fmt.number(r.txCount)}</td>
        <td class="p-2 text-right text-sm">${fmt.currency(avgB)}</td>
        <td class="p-2 text-right text-sm ${r.discountGiven > 0 ? 'text-orange-600' : ''}">${fmt.currency(r.discountGiven)}</td>
        <td class="p-2 text-center text-sm">
          ${r.creditCount   > 0 ? `<span class="px-1.5 py-0.5 rounded bg-red-100    text-red-700    text-xs mr-1">${this.t('credit')}   ${r.creditCount}</span>`   : ''}
          ${r.cashCount     > 0 ? `<span class="px-1.5 py-0.5 rounded bg-blue-100   text-blue-700   text-xs mr-1">${this.t('cash')}     ${r.cashCount}</span>`     : ''}
          ${r.transferCount > 0 ? `<span class="px-1.5 py-0.5 rounded bg-purple-100 text-purple-700 text-xs"    >${this.t('Transfer')} ${r.transferCount}</span>` : ''}
        </td>
        <td class="p-2" style="min-width:110px">
          <div class="flex items-center gap-2">
            <div style="flex:1;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden">
              <div style="width:${share}%;height:100%;background:${color};border-radius:3px"></div>
            </div>
            <span class="text-xs text-gray-500 w-8 text-right">${share}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    // ── Period tabs ──
    const tabs = [
      ['today',  this.t('kpiToday')  || 'Today'],
      ['week',   this.t('kpiWeek')   || 'This Week'],
      ['month',  this.t('kpiMonth')  || 'This Month'],
      ['custom', this.t('kpiCustom') || 'Custom'],
    ];
    const tabHtml = tabs.map(([key, label]) => `
      <button onclick="App._int.kpiPeriod='${key}';App.render()" class="pb-2 text-sm font-medium px-1 ${period === key ? 'tab-active' : 'text-gray-500 hover:text-gray-800'}">${label}</button>
    `).join('');

    const customDateHtml = period === 'custom' ? `
      <div class="flex gap-2 flex-wrap items-end mt-3">
        <div>
          <label class="text-xs text-gray-500 block mb-1">${this.t('date')} ${this.t('kpiFrom') || 'from'}</label>
          <input type="date" value="${this._int.kpiFrom || ''}" onchange="App._int.kpiFrom=this.value" class="border rounded-lg p-2 text-sm">
        </div>
        <div>
          <label class="text-xs text-gray-500 block mb-1">${this.t('date')} ${this.t('kpiTo') || 'to'}</label>
          <input type="date" value="${this._int.kpiTo || ''}" onchange="App._int.kpiTo=this.value" class="border rounded-lg p-2 text-sm">
        </div>
        <button onclick="App.render()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-bold">${this.t('search')}</button>
      </div>` : '';

    return `
    <div class="p-4 max-w-5xl mx-auto">
      <h3 class="text-2xl font-bold mb-4">${this.t('kpi') || 'Staff KPI'}</h3>

      <!-- Period tabs -->
      <div class="flex gap-4 border-b mb-4 flex-wrap">
        ${tabHtml}
      </div>
      ${customDateHtml}

      <!-- Summary KPI cards -->
      <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-5">
        <div class="bg-white rounded-xl shadow p-4 border-l-4 border-green-500">
          <p class="text-xs text-gray-500 mb-1">${this.t('revenue') || 'Revenue'}</p>
          <p class="text-xl font-bold text-green-700">${fmt.currency(totalRevenue)}</p>
        </div>
        <div class="bg-white rounded-xl shadow p-4 border-l-4 border-blue-500">
          <p class="text-xs text-gray-500 mb-1">${this.t('kpiTotalTx') || 'Transactions'}</p>
          <p class="text-xl font-bold text-blue-700">${fmt.number(totalTx)}</p>
        </div>
        <div class="bg-white rounded-xl shadow p-4 border-l-4 border-amber-500">
          <p class="text-xs text-gray-500 mb-1">${this.t('kpiAvgBasket') || 'Avg basket'}</p>
          <p class="text-xl font-bold text-amber-700">${fmt.currency(avgBasket)}</p>
        </div>
        <div class="bg-white rounded-xl shadow p-4 border-l-4 border-purple-500">
          <p class="text-xs text-gray-500 mb-1">${this.t('kpiTopStaff') || 'Top staff'}</p>
          <p class="text-xl font-bold text-purple-700 truncate">${topStaff ? topStaff.name : '—'}</p>
        </div>
      </div>

      <!-- Per-staff table -->
      <div class="bg-white rounded-xl shadow overflow-x-auto mb-5">
        <div class="p-3 border-b font-medium text-sm text-gray-700">${this.t('kpiPerStaff') || 'Per-staff breakdown'}</div>
        <table class="w-full text-sm min-w-[680px]">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-left">${this.t('cashier_label')}</th>
              <th class="p-2 text-right">${this.t('revenue') || 'Revenue'}</th>
              <th class="p-2 text-center">${this.t('kpiTotalTx') || 'Transactions'}</th>
              <th class="p-2 text-right">${this.t('kpiAvgBasket') || 'Avg basket'}</th>
              <th class="p-2 text-right">${this.t('discount')}</th>
              <th class="p-2 text-center">${this.t('paymentMethod')}</th>
              <th class="p-2 text-left" style="min-width:110px">${this.t('kpiShare') || 'Share'}</th>
            </tr>
          </thead>
          <tbody>
            ${staffRows || `<tr><td colspan="7" class="p-4 text-center text-gray-400">${this.t('noData')}</td></tr>`}
          </tbody>
        </table>
      </div>

      <!-- Hourly activity chart -->
      <div class="bg-white rounded-xl shadow p-4">
        <p class="font-medium text-sm text-gray-700 mb-3">${this.t('kpiHourly') || 'Hourly activity'} <span class="text-xs font-normal text-gray-400">(${this.t('kpiAllStaff') || 'all staff combined'})</span></p>
        <div class="flex items-flex-end gap-px" style="height:62px">
          ${hourBars}
        </div>
        ${totalTx === 0 ? `<p class="text-center text-gray-400 text-sm mt-2">${this.t('noData')}</p>` : ''}
      </div>
    </div>`;
  },

});
</script>
<script>
// ═══ PAGE: USERS ═══════════════════════════════════════════════
Object.assign(App, {
  /* ─── USERS PAGE ─── */
  renderUsersPage() {
    const users = this._int.users || [];
    const rows = users.map(u=>`
      <tr class="border-b hover:bg-gray-50">
        <td class="p-2 text-sm font-medium">${u.name}</td>
        <td class="p-2 text-sm">${u.username}</td>
        <td class="p-2 text-sm"><span class="px-2 py-0.5 rounded text-xs ${u.role==='admin'?'bg-purple-100 text-purple-800':'bg-blue-100 text-blue-800'}">${u.role}</span></td>
        <td class="p-2"><span class="px-2 py-0.5 rounded text-xs ${String(u.active).toLowerCase()==='true'?'bg-green-100 text-green-800':'bg-gray-100 text-gray-600'}">${String(u.active).toLowerCase()==='true'?this.t('active'):this.t('inactive')}</span></td>
        <td class="p-2">
          <button class="px-2 py-1 rounded bg-blue-600 text-white text-xs mr-1" onclick='App.openUserModal(${JSON.stringify(u).replace(/'/g,"\\'")})'>${this.t('edit')}</button>
          ${u.id!==this.state.currentUser?.id?`<button class="px-2 py-1 rounded bg-red-600 text-white text-xs" onclick='App.showDeleteConfirm("user","${u.id}","${u.name}")'>${this.t('delete')}</button>`:''}
        </td>
      </tr>`).join('');
    return `
    <div class="p-4">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-2xl font-bold">${this.t('userManagement')}</h3>
        <button onclick="App.openUserModal()" class="px-3 py-2 rounded bg-green-600 text-white text-sm">${this.t('add')} ${this.t('userManagement')}</button>
      </div>
      <div class="bg-white rounded shadow overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-100"><tr><th class="p-2 text-left">Name</th><th class="p-2 text-left">${this.t('username')}</th><th class="p-2">${this.t('role')}</th><th class="p-2">Status</th><th class="p-2" style="min-width:100px">${this.t('actions')}</th></tr></thead>
          <tbody>${rows||`<tr><td colspan="5" class="p-4 text-center text-gray-500">${this.t('noData')}</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
  },
});

</script>
<script>
// ═══ PAGE: MODALS ══════════════════════════════════════════════
Object.assign(App, {
  /* ─── MODALS ─── */
  renderProductModal() {
    const p = this._int.productEditing || {
      id: fmt.uid(), name:{en:'',lo:''},
      weightItem:false, baseUnit:'', packUnit:'', boxUnit:'',
      priceBase:0, pricePack:0, priceBox:0, qtyInPack:'', qtyInBox:'',
      costPrice:0, category:'', barcode:'', image:'', stock:'', minStock:''
    };
    const isWeight = !!(p.weightItem);
    const lo = this.state.language === 'lo';

    const boxUnits  = ['','Crate','Box','bPack','Buget'];
    const packUnits = ['','Pack'];
    // Base units: NO kg/g here — those are for weight items only, typed freely
    const baseUnits = ['','Bottle','sBottle','Can','Cup','sPack','sBox'];

    const _ul = (key) => {
      if (!key) return '';
      const map = {Crate:'unitCrate',Box:'unitBox',bPack:'unitBPack',Buget:'unitBuget',Pack:'unitPack',sPack:'unitSPack',sBox:'unitSBox',Bottle:'unitBottle',sBottle:'unitSBottle',Can:'unitCan',Cup:'unitCup'};
      return map[key] ? this.t(map[key]) : key;
    };
    const optFor = (list, sel) => list.map(u =>
      '<option value="'+u+'"'+(sel===u?' selected':'')+'>'+( u ? _ul(u) : (lo?'-- ເລືອກ --':'-- Select --'))+'</option>'
    ).join('');

    const lbl = (t) => '<span class="block text-xs font-black text-gray-700 uppercase tracking-wide mb-1">'+t+'</span>';
    const inp = (id, type, val, extra) =>
      '<input id="'+id+'" type="'+type+'" value="'+val+'" '+(extra||'')+' class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">';

    return `
    <div class="fixed inset-0 z-50 flex items-center justify-center p-2 sm:p-4">
      <div class="absolute inset-0 bg-black bg-opacity-50" onclick="App.closeProductModal()"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col" style="max-height:95vh">

        <div class="flex items-center justify-between px-5 py-2 flex-shrink-0 bg-green-600 rounded-t-2xl">
          <h3 class="text-lg font-bold text-white">${this._int.productEditing ? this.t('editProduct') : this.t('addProduct')}</h3>
          <button onclick="App.closeProductModal()" class="text-gray-300 hover:bg-red-500 hover:text-white text-2xl leading-none">×</button>
        </div>

        <div class="overflow-y-auto flex-1 px-5 py-2 flex flex-col gap-4">

          <!-- Names -->
          <div class="grid grid-cols-2 gap-3">
            <div>${lbl('Name (EN)')}${inp('pm-name-en','text',p.name?.en||'')}</div>
            <div>${lbl(lo?'ຊື່ (ລາວ)':'Name (LO)')}${inp('pm-name-lo','text',p.name?.lo||'')}</div>
          </div>

          <!-- Category / Barcode -->
          <div class="grid grid-cols-2 gap-3">
            <div>
              ${lbl(lo?'ໝວດໝູ່':'Category')}
              <input id="pm-category" type="text" value="${p.category||''}" list="pm-cat-list"
                class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
              <datalist id="pm-cat-list">
                ${[...new Set(this.state.products.map(x=>x.category).filter(Boolean))].map(c=>`<option value="${c}">`).join('')}
              </datalist>
            </div>
            <div>
              ${lbl(lo?'ບາໂຄດ':'Barcode')}
              <div class="flex gap-1">
                ${inp('pm-barcode','text',p.barcode||'','placeholder="scan or type..."')}
                <button onclick="document.getElementById('pm-barcode').focus()" title="Scan"
                  class="px-2 py-1 bg-gray-800 text-white rounded-lg hover:bg-gray-700 flex items-center justify-center">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <rect x="1" y="3" width="2" height="18"/><rect x="4" y="3" width="1" height="18"/>
                    <rect x="6" y="3" width="2" height="18"/><rect x="9" y="3" width="1" height="18"/>
                    <rect x="11" y="3" width="3" height="18"/><rect x="15" y="3" width="1" height="18"/>
                    <rect x="17" y="3" width="2" height="18"/><rect x="20" y="3" width="1" height="18"/>
                    <rect x="22" y="3" width="1" height="18"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <!-- Weight toggle -->
          <div class="flex items-center gap-3 bg-blue-50 rounded-xl p-3">
            <label class="relative inline-flex items-center cursor-pointer">
              <input type="checkbox" id="pm-weight-item" ${isWeight?'checked':''} onchange="App._pmToggleWeight(this.checked)" class="sr-only peer">
              <div class="w-11 h-6 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-600"></div>
            </label>
            <div>
              <p class="text-sm font-black text-gray-800 text-center">⚖️ ${lo?'ສິນຄ້າຊັ່ງນ້ຳໜັກ/ວັດຄວາມຍາວ (ໝູ, ເຂົ້າ, ເຊືອກ...)':'Weight/Length Item (Pork, Rice, Rope...)'}</p>
              <p class="text-xs text-gray-500 text-center">${lo?'ສາງຈັດເກັບເປັນ kg/g/m — ພະນັກງານໃສ່ຈຳນວນ':'Stock stored in kg/g/m — cashier inputs quantity'}</p>
            </div>
          </div>

          <!-- Base unit -->
          <div class="bg-green-50 rounded-xl p-3">
            <p class="text-xs font-black text-green-800 uppercase tracking-wide mb-2" id="pm-base-title">
              ${isWeight ? (lo?'⚖️ ໜ່ວຍຊັ່ງ (Base Unit)':'⚖️ Weight Unit (Base Unit)') : (lo?'🔹 ໜ່ວຍຂາຍນ້ອຍສຸດ (Base Unit)':'🔹 Smallest Sell Unit (Base Unit)')}
            </p>
            <div class="grid grid-cols-2 gap-3">
              <div>
                ${lbl(lo?'ຊື່ໜ່ວຍ':'Unit Name')}
                ${isWeight
                  ? `<input id="pm-base-unit" type="text" value="${p.baseUnit||'kg'}" list="pm-base-unit-list"
                      placeholder="kg / g / m / cm"
                      class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                     <datalist id="pm-base-unit-list"><option value="kg"><option value="g"><option value="m"><option value="cm"><option value="mm"></datalist>`
                  : `<input id="pm-base-unit" type="text" value="${p.baseUnit||''}" list="pm-base-unit-list"
                      placeholder="${lo?'ເລືອກ ຫຼື ພິມ...':'Select or type...'}"
                      class="w-full border rounded p-2 text-sm focus:ring-2 focus:ring-green-400 outline-none">
                     <datalist id="pm-base-unit-list">
                       ${baseUnits.filter(u=>u).map(u=>'<option value="'+u+'">'+_ul(u)+'</option>').join('')}
                     </datalist>`
                }
              </div>
              <div>
                ${lbl(isWeight ? (lo?'ລາຄາ / kg':'Price / kg') : (lo?'ລາຄາຂາຍ / ໜ່ວຍ':'Sell Price / Unit'))}
                ${inp('pm-price-base','number',p.priceBase||0,'')}
              </div>
            </div>
          </div>

          <!-- Pack / Box (hidden for weight) -->
          <div id="pm-pack-box-section" ${isWeight?'style="display:none"':''}>
            <div class="bg-yellow-50 rounded-xl p-3 mb-2">
              <p class="text-xs font-black text-yellow-800 uppercase tracking-wide mb-2">📦 ${lo?'ແພັກ (Pack Unit — ທາງເລືອກ)':'Pack Unit (optional)'}</p>
              <div class="grid grid-cols-3 gap-2">
                <div>${lbl(lo?'ຊື່ໜ່ວຍ':'Unit Name')}<select id="pm-pack-unit" class="w-full border rounded p-2 text-sm">${optFor(packUnits, p.packUnit||'')}</select></div>
                <div>${lbl(lo?'ຈຳນວນ/ແພັກ':'Qty / Pack')}${inp('pm-qty-in-pack','number',p.qtyInPack||'','min="1" placeholder="12"')}</div>
                <div>${lbl(lo?'ລາຄາຂາຍ':'Sell Price')}${inp('pm-price-pack','number',p.pricePack||'','placeholder="0"')}</div>
              </div>
            </div>
            <div class="bg-orange-50 rounded-xl p-3">
              <p class="text-xs font-black text-orange-800 uppercase tracking-wide mb-2">🗃️ ${lo?'ກ່ອງ/ລັງ (Box Unit — ທາງເລືອກ)':'Box/Crate Unit (optional)'}</p>
              <div class="grid grid-cols-3 gap-2">
                <div>${lbl(lo?'ຊື່ໜ່ວຍ':'Unit Name')}<select id="pm-box-unit" class="w-full border rounded p-2 text-sm">${optFor(boxUnits, p.boxUnit||'')}</select></div>
                <div>${lbl(lo?'ຈຳນວນ/ແກັດ':'Qty / Box')}${inp('pm-qty-in-box','number',p.qtyInBox||'','min="1" placeholder="24"')}</div>
                <div>${lbl(lo?'ລາຄາຂາຍ/ແກັດ':'Sell Price / Box')}${inp('pm-price-box','number',p.priceBox||'','placeholder="0"')}</div>
              </div>
            </div>
          </div>

          <!-- Cost / Min Stock -->
          <div class="grid grid-cols-2 gap-3">
            <div>${lbl(lo?'ລາຄາທຶນ (CostPrice)':'Cost Price')}${inp('pm-cost-price','number',p.costPrice||0,'min="0"')}</div>
            <div>${lbl(lo?'ສາງຕ່ຳສຸດ':'Min Stock')}${inp('pm-min-stock','number',p.minStock??'','min="0" placeholder="10"')}</div>
          </div>

          <!-- Image -->
          <div>
            <span class="block text-xs font-black text-gray-700 uppercase tracking-wide mb-1">${lo?'ຮູບສິນຄ້າ':'Product Image'}</span>
            <div id="pm-img-preview" class="${p.image?'':'hidden'} mb-2">
              <img id="pm-img-tag" src="${p.image||''}" class="h-20 object-cover rounded" onerror="this.style.display='none'">
            </div>
            <div class="flex gap-2 mb-2">
              <button type="button" onclick="document.getElementById('pm-img-camera').click()"
                class="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl bg-gray-500 text-white text-sm font-bold hover:bg-gray-700">
                📷 ${lo?'ຖ່າຍຮູບ':'Camera'}
              </button>
              <button type="button" onclick="document.getElementById('pm-img-gallery').click()"
                class="flex-1 flex items-center justify-center gap-1 py-2 rounded-xl bg-gray-500 text-white text-sm font-bold hover:bg-gray-700">
                🖼️ ${lo?'ຄັງຮູບ':'Gallery'}
              </button>
            </div>
            <input type="file" id="pm-img-camera"  accept="image/*" capture="environment" class="hidden" onchange="App._pmHandleImage(this)">
            <input type="file" id="pm-img-gallery" accept="image/*" class="hidden" onchange="App._pmHandleImage(this)">
            <input id="pm-image" type="text" value="${p.image||''}" placeholder="https://..."
              oninput="App._pmPreviewUrl(this.value)"
              class="w-full border rounded p-2 text-sm text-gray-400 focus:ring-2 focus:ring-green-400 outline-none" style="font-size:11px">
            <div id="pm-img-status" class="text-xs text-gray-500 mt-1"></div>
          </div>

        </div>

  _pmToggleWeight(checked) {
    const sec = document.getElementById('pm-pack-box-section');
    if (sec) sec.style.display = checked ? 'none' : '';
    const title = document.getElementById('pm-base-title');
    const lo = App.state.language === 'lo';
    if (title) title.textContent = checked
      ? (lo ? '⚖️ ໜ່ວຍຊັ່ງ (Base Unit)' : '⚖️ Weight Unit (Base Unit)')
      : (lo ? '🔹 ໜ່ວຍຂາຍນ້ອຍສຸດ (Base Unit)' : '🔹 Smallest Sell Unit (Base Unit)');
    // Swap datalist options for base unit
    const dl = document.getElementById('pm-base-unit-list');
    const inp = document.getElementById('pm-base-unit');
    if (dl && inp) {
      if (checked) {
        dl.innerHTML = '<option value="kg"><option value="g"><option value="m"><option value="cm"><option value="mm">';
        inp.placeholder = 'kg / g / m / cm';
      } else {
        const units = ['Bottle','sBottle','Can','Cup','sPack','sBox'];
        dl.innerHTML = units.map(u=>'<option value="'+u+'">'+u+'</option>').join('');
        inp.placeholder = lo ? 'ເລືອກ ຫຼື ພິມ...' : 'Select or type...';
      }
    }
  },

  _pmPreviewUrl(url) {
    const tag = document.getElementById('pm-img-tag');
    const wrap = document.getElementById('pm-img-preview');
    if (!url) { if(wrap) wrap.classList.add('hidden'); return; }
    if (tag) { tag.src = url; tag.style.display = ''; }
    if (wrap) wrap.classList.remove('hidden');
  },

  _pmHandleImage(input) {
    const file = input.files[0];
    if (!file) return;
    const status = document.getElementById('pm-img-status');
    if (status) status.textContent = App.state.language==='lo' ? 'ກຳລັງອັບໂຫລດ...' : 'Uploading...';
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const fd = { fileName: file.name, mimeType: file.type, data: ev.target.result.split(',')[1] };
      try {
        const url = await App.run('uploadImage', fd);
        const imgInput = document.getElementById('pm-image');
        if (imgInput) imgInput.value = url;
        App._pmPreviewUrl(url);
        if (status) status.textContent = '✅ ' + (App.state.language==='lo' ? 'ອັບໂຫລດສຳເລັດ' : 'Uploaded');
      } catch(e) {
        if (status) status.textContent = '❌ ' + (App.state.language==='lo' ? 'ອັບໂຫລດລົ້ມເຫຼວ' : 'Upload failed');
      }
    };
    reader.readAsDataURL(file);
  },

  renderReceipt(sale) {
    const lang = this.state.language;
    // Helper: resolve the display unit label for a receipt line item
    const _unitLabel = item => {
      const unitKeyMap = { Crate:'unitCrate', Box:'unitBox', bPack:'unitBPack', Buget:'unitBuget',
        Pack:'unitPack', sPack:'unitSPack', sBox:'unitSBox', Bottle:'unitBottle',
        sBottle:'unitSBottle', Can:'unitCan', Cup:'unitCup' };
      // unitRaw is saved by confirmPayment; fall back to legacy fields for old records
      const raw = item.unitRaw
        || (item.selectedUnit === 'box'  ? item.boxUnit  : '')
        || (item.selectedUnit === 'pack' ? item.packUnit : '')
        || item.baseUnit || item.unit || '';
      if (!raw) return '';
      return this.translations[lang]?.[unitKeyMap[raw]] || raw;
    };
    const itemsHtml = (sale.items||[]).map(item=>{
      const unitLbl = _unitLabel(item);
      const qtyLine = unitLbl ? `${item.qty} ${unitLbl} x ${fmt.number(item.price)}` : `${item.qty} x ${fmt.number(item.price)}`;
      return `
      <div class="mb-1">
        <div class="receipt-item-top"><strong>${(lang==='en' ? (item.name?.en||item.name?.lo||'') : (item.name?.lo||item.name?.en||'')).trim()}</strong></div>
        <div class="receipt-item-sub"><strong>${qtyLine}</strong><strong>${fmt.number(item.price*item.qty)}</strong></div>
        <div class="my-1 dashed"></div>
      </div>`;
    }).join('');

    return `
    <style>.total-row { font-size: 13pt !important; } .change-row { font-size: 13pt !important; } @media print { .change-amount { color: black !important; } .total-row { font-size: 13pt !important; } .change-row { font-size: 13pt !important; color: black !important; } }</style>
    <div class="receipt-container select-none">
      <div class="text-center">
        <div class="receipt-title">${this.t('receiptShopName')}</div>
        <div class="receipt-sub receipt-muted">${this.t('receiptShopSub')}</div>
        <div class="receipt-sub">${this.t('receiptShopPhone')}</div>
      </div>
      <div class="receipt-date text-sm"><span>${sale.billNo||''}</span><span>&nbsp;-&nbsp;${fmt.dateTime(sale.date)}</span></div>
      ${sale.customer&&sale.customer.trim()?`<div class="mt-1"><div class="receipt-customername">${this.t('receiptCustomer')}:  ${sale.customer}${sale.customerPhone?' - '+sale.customerPhone:''}</div></div>`:''}
      <div class="my-1 dashed"></div>
      ${itemsHtml}
      
      ${(sale.discount||0) > 0 ? `<div class="receipt-item-sub"><span>${this.t('receiptDiscount')}:</span><span class="font-normal">${fmt.number(sale.discount)}</span></div>` : ''}
      ${sale.discountCode ? `<div class="receipt-item-sub"><span>${this.t('receiptCode')}:</span><span>${sale.discountCode}</span></div>` : ''}
      
      <div class="row total-row"><span class="font-bold">${this.t('receiptTotal')}:</span><span class="font-bold">${fmt.number(sale.total)}</span></div>
      
      ${(sale.cashReceived||0) > 0 ? `<div class="receipt-item-sub"><span>${this.t('cash')}:</span><span class="font-normal">${fmt.number(sale.cashReceived)}</span></div>` : ''}
      ${(sale.transferReceived||0) > 0 ? `<div class="receipt-item-sub"><span>${this.t('Transfer')}:</span><span class="font-normal">${fmt.number(sale.transferReceived)}</span></div>` : ''}
      
      ${(() => {
        // Show credit payment history entries (from PageCreditPayments)
        // If credit data not yet loaded and this is a credit bill, trigger background load then re-render
        if (!this.state._loaded || !this.state._loaded.creditPayments) {
          if (!this._int._creditLoadingForReceipt) {
            this._int._creditLoadingForReceipt = true;
            this.run('fetchCreditPayments').then(res => {
              this.state.creditPayments = res.creditPayments || [];
              if (!this.state._loaded) this.state._loaded = {};
              this.state._loaded.creditPayments = true;
              this._int._creditLoadingForReceipt = false;
              this.render();
            }).catch(() => { this._int._creditLoadingForReceipt = false; });
          }
          return '';
        }
        const creditEntries = (this.state.creditPayments || []).filter(p => p.billNo === sale.billNo);
        if (!creditEntries.length) return '';
        return creditEntries.map(p => {
          const methodLabel = p.method === 'transfer' ? this.t('Transfer') : this.t('cash');
          const dateStr = fmt.dateTime ? fmt.dateTime(p.date) : new Date(p.date).toLocaleDateString();
          return `<div class="receipt-item-sub"><span>${methodLabel} <span style="font-size:0.7em;opacity:0.7">(${dateStr})</span>:</span><span class="font-normal">${fmt.number(p.amount)}</span></div>`;
        }).join('');
      })()}
      
      ${(() => {
        const totalPaid = (sale.cashReceived||0) + (sale.transferReceived||0) + (sale.amountPaid||0);
        const balance = sale.total - totalPaid;
        // credit with nothing paid yet — show full amount as debt
        if (sale.paymentMethod === 'credit' && totalPaid === 0) {
          return `<div class="row change-row" style="color:#dc2626"><span class="font-bold">${this.t('receiptChange')}:</span><span class="font-bold change-amount">${fmt.number(sale.total)}</span></div>`;
        }
        // has payments — show change (positive = change back, negative = still owed)
        const changeAmt = totalPaid - sale.total;
        const isDebt = changeAmt < 0;
        return `<div class="row change-row" style="color:${isDebt?'#dc2626':'inherit'}"><span class="font-bold">${isDebt ? this.t('receiptChange') : this.t('change')}:</span><span class="font-bold change-amount">${fmt.number(Math.abs(changeAmt))}</span></div>`;
      })()}
      <div class="mt-1 dashed"></div>
      <div class="receipt-sub mt-2">
        ${sale.notes?`<div class="row"><span>${this.t('receiptNoteLabel')}: ${sale.notes}</span></div>`:''}
        ${sale.cashier?`<div style="text-align:left">${this.t('cashier_label')}: ${sale.cashier}</div>`:''}
        <div>${this.t('receiptNotes1')}</div>
        <div>${this.t('receiptNotes2')}</div>
      </div>
      <p class="text-center mt-3 font-bold" style="text-align:center">${this.t('thankYou')}</p>
      <div class="mt-3 flex gap-2 print-hidden">
        <button onclick="printReceipt()" class="flex-1 bg-blue-500 text-white py-2 rounded text-sm hover:bg-blue-600">🖨️ Print</button>
        <button onclick="App.hideReceipt()" class="flex-1 bg-gray-200 text-black py-2 rounded text-sm hover:bg-red-500 hover:text-white">✕ ${this.t('close')}</button>
      </div>
    </div>`;
  },
  renderDeleteConfirmModal() {
    const { type, id, label } = this._int.deleteConfirm;
    return `
    <div class="fixed inset-0 z-[60] flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black bg-opacity-50" onclick="App._int.deleteConfirm=null;App.render()"></div>
      <div class="relative bg-white rounded-xl shadow-xl p-6 w-full max-w-sm text-center">
        <div class="text-4xl mb-3">⚠️</div>
        <h3 class="text-lg font-bold mb-2">${this.t('deleteConfirm')}</h3>
        <p class="text-gray-600 text-sm mb-6">${this.t('deleteMsg')} <strong>"${label}"</strong>?</p>
        <div class="flex gap-3 justify-center">
          <button onclick="App._int.deleteConfirm=null; App.render();" class="flex-1 px-4 py-2 border rounded-lg text-sm hover:bg-gray-500 hover:text-white">${this.t('no')}</button>
          <button onclick="App.confirmDelete()" class="flex-1 px-4 py-2 bg-red-400 text-white rounded-lg text-sm font-bold hover:bg-red-600 hover:text-white">${this.t('yes')}</button>
        </div>
      </div>
    </div>`;
  },

  /* ── Payment method pill selector ── */
  _pmSelectMethod(val) {
    const sel = document.getElementById('payment-method-select');
    if (sel) { sel.value = val; this.handlePaymentMethodChange(val); }
    const colorMap = { cash:'#16a34a', Transfer:'#2563eb', cash_transfer:'#4f46e5', credit:'#ea580c' };
    document.querySelectorAll('.pm-method-btn').forEach(b => {
      const mid = b.id.replace('pmb-','');
      const active = mid === val;
      b.style.background  = active ? (colorMap[mid]||'#16a34a') : '';
      b.style.color       = active ? '#fff' : '';
      b.style.borderColor = active ? (colorMap[mid]||'#16a34a') : '';
    });
  },
});
</script>
<script>
// ═══ INIT ══════════════════════════════════════════════════════
/* ─── DEBOUNCED HELPERS ─── */
App.debouncedSearch = debounce(q => App.setSearchQuery(q), 1500);

/* ─── GLOBAL FUNCTIONS ─── */
window._editSale = function(billNo) {
  const sale = App.state.sales.find(s => s.billNo === billNo);
  if (!sale) { alert(App.t('saleNotFound')); return; }
  App._int.editingSaleBillNo = billNo;
  App._int.originalSaleData = JSON.parse(JSON.stringify(sale));
  App.state.cart = JSON.parse(JSON.stringify(sale.items)).map(item => ({ ...item, cartItemId: fmt.uid() }));
  App.state.discount = sale.discount || 0;
  App.state.discountCode = sale.discountCode || '';
  App.setCurrentPage('sell');
};

/* ─── INIT ─── For showing Login page (uncomment below and comment out App.fetchData() above to use login screen instead):*/
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('app-loading').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
});

// ─── PWA: Register Service Worker ────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/mahasap.github.io/service-worker.js')
      .then(reg => console.log('[PWA] Service Worker registered:', reg.scope))
      .catch(err => console.warn('[PWA] Service Worker registration failed:', err));
  });
}
</script>
