    setTimeout(() => {
      App._patchCart();
    }, 0);

    const productGrid = filtered.map(p => this._renderProductCard(p)).join('');

    return `
    <!-- FIX 2: Barcode input — visible off-screen so it can always receive focus/keydown -->
    <input id="hw-barcode-input" type="text" autocomplete="off" inputmode="none"
      style="position:fixed;opacity:0;width:1px;height:1px;top:-9999px;left:-9999px;border:none;outline:none;"
      onkeydown="App._hwInputKey(event)"
      oninput="App._hwInputChange(this)">

    <div class="hidden lg:flex flex-row p-2 gap-2 h-full bg-gray-100">
      <div class="w-2/5 flex flex-col gap-2 h-full">
        ${isEditing?`<div class="bg-yellow-100 border border-yellow-400 text-yellow-800 text-sm rounded p-2 flex justify-between items-center"><span>✏️ Editing: ${this._int.editingSaleBillNo}</span><button onclick="App.clearCart();" class="text-lg font-bold px-4 py-2 rounded-lg bg-red-500 text-white hover:bg-red-600">${this.t('cancel')}</button></div>`:''}
        <!-- Customer name bar above cart -->
        <div class="bg-white rounded-lg shadow px-2 py-1.5 flex items-center gap-2">
          <span class="text-xs font-bold text-blue-600 whitespace-nowrap">👤</span>
          <input class="cart-customer-name-inp flex-1 border rounded-lg px-2 py-1 text-sm"
            placeholder="${this.t('customerName')} (${this.t('optional')||'optional'})"
            value="${this._int._pendingCustomerName||''}"
            autocomplete="off"
            oninput="App._int._pendingCustomerName=this.value.trim();App._filterCustomerListCart(this.value,this)"
            onclick="App._openCustomerCart(this)"
            ontouchstart="event.preventDefault();this.focus();App._openCustomerCart(this);"
            onblur="App._hwRefocus()"
            onkeydown="if(event.key==='Enter'){App._int._pendingCustomerName=this.value.trim();App._closeCustomerCart();App._hwRefocus();}">
        </div>
        <div class="flex-1 bg-white rounded-lg shadow overflow-y-auto cart-items-zone">${cartInnerHtml}</div>
        <div class="bg-white rounded-lg shadow p-3">
          <div class="flex justify-between text-xl font-bold text-green-700 mb-2"><span>${this.t('grandTotal')}:</span><span class="cart-grand-total">${fmt.currency(grandTotal)}</span></div>
          <div class="flex gap-2">
            <button onclick="App.clearCart();" class="flex-1 border border-gray-400 text-red-500 py-3 rounded-lg text-lg font-bold hover:bg-red-600 hover:text-white">${this.t('cancel')}</button>
            <button onclick="App.openPaymentModal()" class="cart-pay-btn flex-1 bg-green-500 text-white text-lg font-bold py-3 rounded-lg hover:bg-green-600 disabled:bg-gray-400" ${!this.state.cart.length?'disabled':''}>${this.t('payment')}</button>
          </div>
        </div>
      </div>
      <div class="w-3/5 flex flex-col bg-gray-100 h-full gap-2">
        <div class="flex gap-2 items-center">
          <input value="${this.state.searchQuery}" oninput="App.debouncedSearch(this.value)" type="text" placeholder="${this.t('searchProducts')}" tabindex="-1" class="flex-1 p-2 rounded-lg border shadow-lg product-search-inp"
            onfocus="App._searchFocused=true" onblur="App._searchFocused=false;App._searchDone()"
            onkeydown="if(event.key==='Enter'){this.blur();}">
        </div>
        <div class="flex flex-nowrap gap-1 overflow-x-auto pb-1">
          ${categories.map(cat=>`<button data-cat="${cat}" onclick="App.setSelectedCategory('${cat}')" class="cat-pill px-3 py-1 text-xs rounded-full whitespace-nowrap ${selCat===cat?'bg-green-600 text-white':'bg-white hover:bg-gray-100'}">${cat==='all'?this.t('all'):cat}</button>`).join('')}
        </div>
        <div class="flex-1 overflow-y-auto">
          <div class="product-grid-zone grid grid-cols-5 gap-2">${productGrid||`<p class="col-span-5 text-center text-gray-400 py-8">${this.t('noData')}</p>`}</div>
        </div>
      </div>
    </div>
    <div class="lg:hidden p-2 flex flex-col gap-2">
      ${isEditing?`<div class="bg-yellow-100 border border-yellow-400 text-yellow-800 text-sm rounded p-2">✏️ Editing: ${this._int.editingSaleBillNo}</div>`:''}
      <!-- Customer name bar above cart (mobile) -->
      <div class="bg-white rounded-lg shadow px-2 py-1.5 flex items-center gap-2">
        <span class="text-xs font-bold text-blue-600">👤</span>
        <input class="cart-customer-name-inp flex-1 border rounded-lg px-2 py-1 text-sm"
          placeholder="${this.t('customerName')} (${this.t('optional')||'optional'})"
          value="${this._int._pendingCustomerName||''}"
          autocomplete="off"
          oninput="App._int._pendingCustomerName=this.value.trim();App._filterCustomerListCart(this.value,this)"
          onclick="App._openCustomerCart(this)"
          ontouchstart="event.preventDefault();this.focus();App._openCustomerCart(this);"
          onblur="App._hwRefocus()"
          onkeydown="if(event.key==='Enter'){App._int._pendingCustomerName=this.value.trim();App._closeCustomerCart();App._hwRefocus();}">
      </div>
      <div class="bg-white rounded-lg shadow">
        <div class="min-h-[80px] max-h-[35vh] overflow-y-auto cart-items-zone">${cartInnerHtml}</div>
        <div class="p-2 border-t">
          <div class="flex justify-between font-bold text-green-700 mb-2"><span>${this.t('grandTotal')}:</span><span class="cart-grand-total">${fmt.currency(grandTotal)}</span></div>
          <div class="flex gap-2">
            <button onclick="App.clearCart();" class="flex-1 border border-gray-400 text-gray-700 py-2 rounded-lg font-bold hover:bg-red-500 text-red-500 hover:text-white">${this.t('cancel')}</button>
            <button onclick="App.openPaymentModal()" class="cart-pay-btn flex-1 bg-green-500 text-white font-bold py-3 rounded-lg disabled:bg-gray-400" ${!this.state.cart.length?'disabled':''}>${this.t('payment')}</button>
          </div>
        </div>
      </div>
      <div class="flex gap-2 items-center">
        <input value="${this.state.searchQuery}" oninput="App.debouncedSearch(this.value)" type="text" placeholder="${this.t('searchProducts')}" tabindex="-1" class="flex-1 p-2 rounded-lg border product-search-inp"
          onfocus="App._searchFocused=true" onblur="App._searchFocused=false;App._searchDone()"
          onkeydown="if(event.key==='Enter'){this.blur();}">
      </div>
      <div class="flex flex-nowrap gap-1 overflow-x-auto pb-1">
        ${categories.map(cat=>`<button data-cat="${cat}" onclick="App.setSelectedCategory('${cat}')" class="cat-pill px-3 py-1 text-xs rounded-full whitespace-nowrap ${selCat===cat?'bg-green-600 text-white':'bg-white hover:bg-gray-100'}">${cat==='all'?this.t('all'):cat}</button>`).join('')}
      </div>
      <div class="product-grid-zone grid grid-cols-3 gap-2">${productGrid}</div>
    </div>`;
  },

  /* ── HW Input helpers (called from hw-barcode-input element) ── */
  // Handles Enter key directly on the hidden input
  _hwInputKey(e) {
    if (e.key === 'Enter') {
      const inp = document.getElementById('hw-barcode-input');
      if (!inp) return;
      const val = inp.value.trim();
      inp.value = '';
      if (val.length >= 3) this.addToCartByBarcode(val);
    }
  },
  // Safety net: if input accumulates a long value without Enter (some scanners omit it)
  _hwInputChange(inp) {
    // Some scanners don't send Enter; if value looks complete (>=8 chars) after a brief pause, try it
    clearTimeout(this._hwAutoSubmitTimer);
    const val = inp.value.trim();
    if (val.length >= 8) {
      this._hwAutoSubmitTimer = setTimeout(() => {
        const current = document.getElementById('hw-barcode-input');
        if (!current) return;
        const v = current.value.trim();
        current.value = '';
        if (v.length >= 3) App.addToCartByBarcode(v);
      }, 120);
    }
  },

  // ── Refocus hw-barcode-input after an input is done ──
  // Scanner (USB/BT) is used on desktop, tablet, AND mobile — always refocus.
  // Only exception: customer name input (user explicitly tapped it).
  _hwRefocus() {
    clearTimeout(this._hwRefocusTimer);
    this._hwRefocusTimer = setTimeout(() => {
      const ae = document.activeElement;
      if (ae && ae.classList.contains('cart-customer-name-inp')) return;
      const hw = document.getElementById('hw-barcode-input');
      if (hw) hw.focus({ preventScroll: true });
    }, 200);
  },

  // ── Called when user is done with search box (blur or Enter) ──
  _searchDone() {
    clearTimeout(this._hwRefocusTimer);
    this._hwRefocusTimer = setTimeout(() => {
      const hw = document.getElementById('hw-barcode-input');
      if (hw) hw.focus({ preventScroll: true });
    }, 200);
  },

  // ── Document-level focus guard ──
  // Any tap/click on a non-interactive area returns focus to the scanner.
  // Uses capture phase so it fires first; defers with setTimeout(0) so it
  // runs AFTER the browser's own focus routing finishes (including the
  // touchstart→mousedown→focus chain on mobile).
  _attachScanFocusGuard() {
    App._detachScanFocusGuard();
    App._scanFocusGuardFn = (e) => {
      // Walk up from the tapped element — if any ancestor is an input/button, bail
      let el = e.target;
      while (el && el !== document.body) {
        const tag = el.tagName;
        if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'BUTTON') return;
        // Customer dropdown and overlay live outside app-root — skip them too
        if (el.id === 'cart-customer-dropdown' || el.id === 'cart-dd-overlay') return;
        el = el.parentElement;
      }
      // Defer so this runs after the browser finishes its own focus assignment
      setTimeout(() => {
        const ae = document.activeElement;
        // Only back off for customer name input (user explicitly tapped it)
        if (ae && ae.classList.contains('cart-customer-name-inp')) return;
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus({ preventScroll: true });
      }, 0);
    };
    document.addEventListener('mousedown', App._scanFocusGuardFn, true);
    document.addEventListener('touchstart', App._scanFocusGuardFn, { capture: true, passive: true });
  },
  _detachScanFocusGuard() {
    if (App._scanFocusGuardFn) {
      document.removeEventListener('mousedown', App._scanFocusGuardFn, true);
      document.removeEventListener('touchstart', App._scanFocusGuardFn, true);
      App._scanFocusGuardFn = null;
    }
  },

  // ── Customer cart dropdown — single floating dropdown appended to body ──
  // Works on desktop, tablet, mobile. No duplicate-ID issues.
  _buildCustomerDropdown() {
    // Remove any existing
    const old = document.getElementById('cart-customer-dropdown');
    if (old) old.remove();
    const dd = document.createElement('div');
    dd.id = 'cart-customer-dropdown';
    dd.style.cssText = 'display:none;position:fixed;z-index:10001;background:#fff;border:1px solid #d1d5db;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,0.22);max-height:50vh;overflow-y:auto;min-width:220px';
    const customers = App.state.customers || [];
    if (customers.length === 0) {
      dd.innerHTML = '<div style="padding:12px 16px;color:#9ca3af;font-size:13px">No customers</div>';
    } else {
      dd.innerHTML = customers.map(c => `
        <div data-name="${c.name.replace(/"/g,'&quot;')}" data-id="${c.id}"
          style="padding:12px 16px;cursor:pointer;font-size:14px;border-bottom:1px solid #f3f4f6;display:flex;flex-direction:column">
          <span style="font-weight:600">${c.name}</span>
          ${c.phone?`<span style="color:#6b7280;font-size:12px">${c.phone}</span>`:''}
        </div>`).join('');
      // Attach events to each item
      dd.querySelectorAll('[data-id]').forEach(el => {
        const select = () => App._selectCustomerCart(el.dataset.id, el.dataset.name);
        el.addEventListener('mousedown', e => { e.preventDefault(); select(); });
        el.addEventListener('touchend',  e => { e.preventDefault(); select(); });
        el.addEventListener('mouseover', () => el.style.background = '#eff6ff');
        el.addEventListener('mouseout',  () => el.style.background = '');
      });
    }
    document.body.appendChild(dd);
    return dd;
  },
  _openCustomerCart(inp) {
    // Build fresh dropdown each time (ensures latest customer list)
    const dd = App._buildCustomerDropdown();
    App._cartDdInput = inp; // remember which input triggered it
    const rect = inp.getBoundingClientRect();
    const ddW = Math.max(rect.width, 260);
    // Position: below input, aligned left, flip up if near bottom
    let top = rect.bottom + window.scrollY + 4;
    let left = rect.left + window.scrollX;
    // Keep within viewport width
    if (left + ddW > window.innerWidth - 8) left = window.innerWidth - ddW - 8;
    dd.style.top   = rect.bottom + 4 + 'px';
    dd.style.left  = left + 'px';
    dd.style.width = ddW + 'px';
    dd.style.display = '';
    App._ensureCartOverlay();
  },
  _ensureCartOverlay() {
    if (document.getElementById('cart-dd-overlay')) return;
    const ov = document.createElement('div');
    ov.id = 'cart-dd-overlay';
    ov.style.cssText = 'position:fixed;inset:0;z-index:10000;background:transparent;-webkit-tap-highlight-color:transparent';
    ov.addEventListener('touchend', e => {
      // Only close if the touch target is the overlay itself, not a child of the dropdown
      const dd = document.getElementById('cart-customer-dropdown');
      if (dd && dd.contains(e.target)) return;
      e.preventDefault();
      App._closeCustomerCart();
    });
    ov.addEventListener('mousedown', e => {
      const dd = document.getElementById('cart-customer-dropdown');
      if (dd && dd.contains(e.target)) return;
      App._closeCustomerCart();
    });
    document.body.appendChild(ov);
  },
  _closeCustomerCart() {
    const dd = document.getElementById('cart-customer-dropdown');
    if (dd) dd.remove();
    const ov = document.getElementById('cart-dd-overlay');
    if (ov) ov.remove();
    App._cartDdInput = null;
    App._hwRefocus(); // return to scan mode on desktop
  },
  _filterCustomerListCart(val, inp) {
    // Open if not already open
    let dd = document.getElementById('cart-customer-dropdown');
    if (!dd) {
      if (inp) App._openCustomerCart(inp);
      dd = document.getElementById('cart-customer-dropdown');
    }
    if (!dd) return;
    const q = (val||'').toLowerCase();
    dd.querySelectorAll('[data-id]').forEach(el => {
      const name = (el.dataset.name||'').toLowerCase();
      el.style.display = (!q || name.includes(q)) ? '' : 'none';
    });
  },
  _selectCustomerCart(id, name) {
    // Write value to whichever input is visible (the active one)
    document.querySelectorAll('.cart-customer-name-inp').forEach(inp => {
      if (inp.offsetParent !== null) inp.value = name;
    });
    // Also persist in _int so it survives render() when Payment modal opens
    App._int._pendingCustomerName = name || '';
    App._closeCustomerCart();
    // Return focus to scanner
    App._hwRefocus();
  },
  // Read customer name from whichever cart input is currently visible
  _getCartCustomerName() {
    let val = '';
    document.querySelectorAll('.cart-customer-name-inp').forEach(inp => {
      if (inp.offsetParent !== null) val = inp.value.trim();
    });
    // Fallback: return whatever was last stored
    return val || App._int._pendingCustomerName || '';
  },

  /* ─────────────── PRODUCT CARD CACHE (Fix D) ─────────────── */
  // Cache rendered card HTML per product so repeated renders don't rebuild unchanged cards.
  // Cache key includes stock + language so any change invalidates correctly.
  _cardCache: {},
  _renderProductCard(p) {
    const key = `${p.id}_${p.stock}_${p.priceBase||p.price}_${this.state.language}`;
    if (this._cardCache[key]) return this._cardCache[key];
    const isOut = p.stock !== null && p.stock !== undefined && p.stock <= 0;
    const isLow = p.stock !== null && p.stock !== undefined && p.stock > 0 && p.minStock !== null && p.minStock !== undefined && p.stock <= p.minStock;
    const displayPrice = Number(p.priceBase) || Number(p.price) || 0;
    const html = `
    <div onclick='App.addToCart(${JSON.stringify(p)})' class="bg-white rounded-lg shadow cursor-pointer hover:shadow-lg transition flex flex-col ${isOut?'opacity-50':''}">
      <div class="relative">
        <img src="${p.image||''}" class="w-full h-20 object-cover rounded-t-lg" onerror="this.src='https://picsum.photos/seed/${p.id}/150/150'">
        ${isOut?`<span class="absolute top-1 right-1 bg-red-600 text-white text-xs px-1 rounded">${this.t('outOfStock')}</span>`:''}
        ${isLow?`<span class="absolute top-1 right-1 bg-yellow-500 text-white text-xs px-1 rounded">${this.t('lowStock')}</span>`:''}
        ${p.stock!==null&&p.stock!==undefined&&!isOut?`<span class="absolute bottom-1 left-1 bg-black bg-opacity-50 text-white text-xs px-1 rounded">${p.stock}</span>`:''}
      </div>
      <div class="p-1.5 flex-grow flex flex-col justify-between">
        <p class="text-xs font-medium text-center flex-grow leading-tight">${p.name[this.state.language]||''}</p>
        <div class="mt-1 text-center text-white text-xs font-bold bg-green-500 rounded py-0.5">${fmt.currency(displayPrice)}</div>
      </div>
    </div>`;
    this._cardCache[key] = html;
    return html;
  },

  /* ─────────────── SURGICAL GRID UPDATE (Fix B) ─────────────── */
  // Rebuilds ONLY the product grid zones — no sidebar, no header, no cart touch.
  // Called by setSelectedCategory and debouncedSearch instead of render().
  _updateProductGrid() {
    const q = this.state.searchQuery.trim().toLowerCase();
    const selCat = this._int.selectedCategory || 'all';
    const filtered = this.state.products.filter(p => {
      const matchCat = selCat === 'all' || p.category === selCat;
      const matchQ = !q || (p.name?.en||'').toLowerCase().includes(q)
                        || (p.name?.lo||'').toLowerCase().includes(q)
                        || (p.barcode||'').toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    const gridHtml = filtered.map(p => this._renderProductCard(p)).join('');
    const noData = `<p class="col-span-5 text-center text-gray-400 py-8">${this.t('noData')}</p>`;

    // Update desktop grid (col-5) and mobile grid (col-3) separately
    document.querySelectorAll('.product-grid-zone').forEach(zone => {
      zone.innerHTML = gridHtml || noData;
    });

    // Update category pill active states without rebuilding them
    document.querySelectorAll('.cat-pill').forEach(btn => {
      const cat = btn.dataset.cat;
      if (cat === selCat) {
        btn.className = 'cat-pill px-3 py-1 text-xs rounded-full whitespace-nowrap bg-green-600 text-white';
      } else {
        btn.className = 'cat-pill px-3 py-1 text-xs rounded-full whitespace-nowrap bg-white hover:bg-gray-100';
      }
    });

    // Keep focus on scanner after grid update
    if (this.state.currentPage === 'sell') {
      const ae = document.activeElement;
      const isUserInput = ae && (ae.classList.contains('product-search-inp') || ae.id === 'search-input');
      if (!isUserInput) {
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus({ preventScroll: true });
      }
    }
  },

  /* ─────────────── OVERRIDE setSelectedCategory ─────────────── */
  // Replace the full render() call with a surgical grid update.
  setSelectedCategory(cat) {
    this._int.selectedCategory = cat;
    if (this.state.currentPage === 'sell' && document.querySelector('.product-grid-zone')) {
      this._updateProductGrid();
    } else {
      this.render();
    }
    // Return focus to scanner
    if (this.state.currentPage === 'sell') {
      setTimeout(() => {
        const hw = document.getElementById('hw-barcode-input');
        if (hw) hw.focus({ preventScroll: true });
      }, 0);
    }
  },

  /* ─────────────── OVERRIDE debouncedSearch ─────────────── */
  // Replace the full render() call with a surgical grid update.
  // Debounce by 120ms so fast typing doesn't spam DOM updates.
  debouncedSearch(val) {
    this.state.searchQuery = val;
    clearTimeout(this._searchDebounceTimer);
    if (this.state.currentPage === 'sell' && document.querySelector('.product-grid-zone')) {
      this._searchDebounceTimer = setTimeout(() => {
        this._updateProductGrid();
      }, 120);
    } else {
      this._searchDebounceTimer = setTimeout(() => {
        this.render();
      }, 120);
    }
  },

  /* ─────────────── INVALIDATE CARD CACHE on stock/product change ─────────────── */
  // Call this after addOrUpdateProduct or stock changes so stale cards are cleared.
  _invalidateCardCache(productId) {
    if (productId) {
      // Remove only cards for this product
      Object.keys(this._cardCache).forEach(k => {
        if (k.startsWith(String(productId) + '_')) delete this._cardCache[k];
      });
    } else {
      // Full wipe (e.g. after adjustStock saves all)
      this._cardCache = {};
    }
  },
});
</script>
<script>
// ═══ PAGE: SALES ═══════════════════════════════════════════════
Object.assign(App, {
  /* ─── REPRINT PAGE ─── */
  renderReprintPage() {
    if (this.state.pageLoading || !this.state._loaded.sales) {
      return `<div class="p-8 text-center text-gray-500">${this.t('loadSalesHistory')}</div>`;
    }
    const q = this._int.reprintSearch.trim();
    
    // Core balance evaluation formula
    const _isUnpaid = s => {
      const balance = s.total - ((s.cashReceived || 0) + (s.transferReceived || 0) + (s.amountPaid || 0));
      return balance > 0;
    };
    
    const _tier = s => _isUnpaid(s) ? 0 : (s.notes?.trim() ? 1 : 2);
    
    // Added safety check to clean out phantom data entries lacking a bill number
    const validSales = [...(this.state.sales || [])].filter(s => s.billNo && s.billNo.trim() !== '');
    
    const recentSales = validSales.sort((a,b) => {
      const ta = _tier(a), tb = _tier(b);
      if (ta !== tb) return ta - tb;
      return new Date(b.date)-new Date(a.date);
    });
    
    return `
    <div class="p-4">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 class="text-2xl font-bold">${this.t('reprint')}</h3>
        <div class="flex gap-2">
          <input value="${this._int.reprintSearch}" oninput="App._int.reprintSearch=this.value.trim();" placeholder="${this.t('billSearch')}" class="border rounded p-2 text-sm w-40 sm:w-auto">
          <button onclick="App.render()" class="px-4 py-2 rounded bg-blue-500 text-white text-sm">${this.t('search')}</button>
        </div>
      </div>
      ${q && !recentSales.find(s=>String(s.billNo)===q) ? `<p class="text-gray-500 text-sm mb-4">${this.t('saleNotFound')}</p>` : ''}
      <div class="bg-white rounded shadow overflow-x-auto">
        <table class="w-full text-sm min-w-max">
          <thead class="bg-gray-100">
            <tr>
              <th class="px-2 py-2 text-center">${this.t('billNo')}</th>
              <th class="px-2 py-1.5 text-center">${this.t('date')}</th>
              <th class="px-2 py-1.5 text-left">${this.t('customerName')}</th>
              <th class="px-2 py-1.5 text-right">${this.t('total')}</th>
              <th class="px-2 py-1.5 text-center">${this.t('paymentMethod')}</th></tr>
          </thead>
          <tbody>
            ${recentSales.filter(s=>!q||String(s.billNo).includes(q)).map(s=>`
            <tr class="border-b cursor-pointer hover:bg-green-200 ${_isUnpaid(s)?'bg-red-200 text-gray-800':(s.notes?.trim()?'bg-green-200 text-green-800':'')}" onclick='App.showReceipt(${JSON.stringify(s)})'>
              <td class="px-2 py-1.5 whitespace-nowrap text-xs text-center">${s.billNo}</td>
              <td class="px-2 py-1.5 whitespace-nowrap text-xs text-center">${fmt.dateTime(s.date)}</td>
              <td class="px-2 py-1.5 max-w-[120px] truncate text-xs">${s.customer}</td>
              <td class="px-2 py-1.5 text-right whitespace-nowrap text-xs">${fmt.currency(s.total)}</td>
              <td class="px-2 py-1.5 text-center"><span class="inline-block px-2 py-0.5 rounded text-xs ${s.paymentMethod==='credit'?'bg-red-600 text-white':'bg-blue-600 text-white'}">${this.t(s.paymentMethod)||s.paymentMethod}</span></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  },

  /* ─── SALE RECORD PAGE ─── */
  renderSaleRecordPage() {
    if (this.state.pageLoading || !this.state._loaded.sales) {
      return `<div class="p-8 text-center text-gray-500">${this.t('loadSalesHistory')}</div>`;
    }
    const q = this.state.searchQuery.trim().toLowerCase();
    
    // Added safety check to clear out ghost data objects lacking a bill number
    const validSales = [...(this.state.sales || [])].filter(s => s.billNo && s.billNo.trim() !== '');
    
    const list = q ? validSales.filter(s=>(s.billNo||'').toLowerCase().includes(q)||(s.customer||'').toLowerCase().includes(q)) : validSales;
    
    const _isUnpaid = s => {
      const balance = s.total - ((s.cashReceived || 0) + (s.transferReceived || 0) + (s.amountPaid || 0));
      return balance > 0;
    };
    
    const _tier = s => _isUnpaid(s) ? 0 : (s.notes?.trim() ? 1 : 2);
    list.sort((a,b)=>{
      const ta = _tier(a), tb = _tier(b);
      if (ta !== tb) return ta - tb;
      return new Date(b.date)-new Date(a.date);
    });

<script>
// ═══ PAGE: STOCK ═══════════════════════════════════════════════
Object.assign(App, {
  /* ─── ADJUST STOCK PAGE ─── */
  renderAdjustStockPage() {
    const q = this.state.searchQuery.trim().toLowerCase();
    const list = q
      ? this.state.products.filter(p => (p.name?.en||'').toLowerCase().includes(q) || (p.name?.lo||'').toLowerCase().includes(q) || (p.barcode||'').toLowerCase().includes(q))
      : this.state.products;

    const rows = list.map(p => {
      const stockClass = p.stock !== null && p.stock <= 0
        ? 'bg-red-50'
        : (p.stock !== null && p.minStock !== null && p.stock <= p.minStock ? 'bg-yellow-50' : '');
      const stockVal = p.stock !== null ? p.stock : '';
      return `
      <tr class="border-b ${stockClass}">
        <td class="p-2 font-medium flex items-center gap-2" style="min-width:160px">
          <img src="${p.image||''}" class="w-9 h-9 object-cover rounded flex-shrink-0" onerror="this.src='https://picsum.photos/seed/${p.id}/50/50'">
          <span class="text-sm">${p.name[this.state.language]||p.name.en||''}</span>
        </td>
        
        <td class="p-2 text-center">
          <div class="flex items-center justify-center gap-1">
            <button onclick="App._stockDec('${p.id}')" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-red-100 flex items-center justify-center font-bold text-base leading-none select-none">−</button>
            <input
              id="stock-input-${p.id}"
              type="number"
              value="${stockVal}"
              placeholder="—"
              class="w-16 text-center border-2 border-gray-200 focus:border-green-400 rounded-lg py-1 hide-arrows text-sm font-bold outline-none"
              oninput="App._stockMarkDirty('${p.id}', this)"
            >
            <button onclick="App._stockInc('${p.id}')" class="w-7 h-7 rounded-full bg-gray-200 hover:bg-green-100 flex items-center justify-center font-bold text-base leading-none select-none">+</button>
          </div>
        </td>
        <td class="p-2 text-xs text-gray-500 text-center">${p.unit||''}</td>
        <td class="p-2 text-xs text-gray-400 text-center">${p.minStock != null ? p.minStock : '—'}</td>
        <td class="p-2 text-xs text-gray-500 text-center">${p.category||''}</td>
      </tr>`;
    }).join('');

    return `
    <div class="p-4 max-w-3xl mx-auto">
      <div class="flex items-center justify-between mb-3 flex-wrap gap-2">
        <div>
          <h3 class="text-2xl font-bold">${this.t('adjustStock')}</h3>
          <p class="text-xs text-gray-500 mt-0.5">${this.t('adjustStockHint')}</p>
        </div>
        <div class="flex gap-2 items-center">
          <input value="${this.state.searchQuery}" oninput="App.debouncedSearch(this.value)" placeholder="${this.t('search')}" class="border rounded p-2 text-sm">
          <button onclick="App.saveAllStock()" class="px-4 py-2 rounded-lg bg-green-600 text-white font-bold text-sm hover:bg-green-700">
            💾 ${this.t('stockSaveAll')}
          </button>
        </div>
      </div>
      <div id="stock-save-banner" class="hidden mb-3 bg-green-100 border border-green-400 text-green-800 rounded-lg p-2 text-sm text-center font-medium"></div>
      <div class="bg-white rounded-xl shadow overflow-x-auto">
        <table class="w-full text-sm min-w-[480px]">
          <thead class="bg-gray-100">
            <tr>
              <th class="p-2 text-center pl-4" style="min-width:160px">${this.t('productName')}</th>
              <th class="p-2 text-center" style="min-width:120px">${this.t('stock')}</th>
              <th class="p-2 text-center">${this.t('unit')}</th>
              <th class="p-2 text-center">${this.t('minStock')}</th>
              <th class="p-2 text-center">${this.t('category')}</th>
            </tr>
          </thead>
          <tbody>${rows || `<tr><td colspan="5" class="p-4 text-center text-gray-500">${this.t('noData')}</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
  },

  /* stock page helpers — manipulate input DOM directly, no re-render */
  _stockInc(productId) {
    const input = document.getElementById('stock-input-' + productId);
    if (!input) return;
    const val = parseInt(input.value) || 0;
    input.value = val + 1;
    this._stockMarkDirty(productId, input);
  },
  _stockDec(productId) {
    const input = document.getElementById('stock-input-' + productId);
    if (!input) return;
    const val = parseInt(input.value) || 0;
    input.value = Math.max(0, val - 1);
    this._stockMarkDirty(productId, input);
  },
  _stockMarkDirty(productId, inputEl) {
    inputEl.classList.add('border-orange-400');
    const p = this.state.products.find(x => String(x.id) === String(productId));
    if (p) p._pendingStock = parseInt(inputEl.value);
  },

  async saveAllStock() {
    const rows = document.querySelectorAll('[id^="stock-input-"]');
    const updates = [];
    rows.forEach(input => {
      const productId = input.id.replace('stock-input-', '');
      const val = input.value.trim();
      if (val === '') return; 
      const newStock = parseInt(val);
      if (isNaN(newStock)) return;
      updates.push({ id: productId, stock: newStock });
    });

    if (!updates.length) {
      alert('No stock values to save.');
      return;
    }

    updates.forEach(({ id, stock }) => {
      const p = this.state.products.find(x => String(x.id) === String(id));
      if (p) { p.stock = stock; delete p._pendingStock; }
    });

    const savePromises = updates.map(({ id, stock }) => {
      const p = this.state.products.find(x => String(x.id) === String(id));
      if (!p) return Promise.resolve();
      return this.run('addOrUpdateProduct', p).catch(console.error);
    });

    await Promise.all(savePromises);

    rows.forEach(input => input.classList.remove('border-orange-400'));

    const banner = document.getElementById('stock-save-banner');
    if (banner) {
      banner.textContent = `✅ ${this.t('stockUpdated')} (${updates.length} items)`;
      banner.classList.remove('hidden');
      setTimeout(() => banner.classList.add('hidden'), 3000);
    }
  },
});
</script>

                  <thead class="sticky top-0 bg-gray-50 border-b z-10">
                    <tr>
                      <th class="text-center text-xs font-bold text-gray-500 uppercase py-2 px-3">Item</th>
                      <th class="text-center text-xs font-bold text-gray-500 uppercase py-2 px-1">Qty</th>
                      <th class="text-center text-xs font-bold text-gray-500 uppercase py-2 px-1">Cost (₭)</th>
                      <th class="w-8"></th>
                    </tr>
                  </thead>
                  <tbody class="px-2">${cartRows}</tbody>
                </table>`
            }
          </div>

          <div class="flex gap-3">
            <button onclick="App.cancelPurchaseForm()"
              class="flex-1 border border-gray-400 text-red-500 py-3 rounded-lg text-sm font-bold hover:bg-red-600 hover:text-white">${this.t('cancel')}</button>
            <button onclick="App._int.purchaseSupplier = ''; App.submitPurchaseForm()"
              class="flex-1 bg-green-600 text-white font-bold py-3 rounded-xl shadow hover:bg-green-700 transition text-sm">
              ${this.t('submitPurchase')}
            </button>
          </div>
        </div>

        <div class="w-full md:w-1/2 bg-white rounded-2xl border-2 border-green-500 shadow p-4 flex flex-col md:h-full overflow-hidden">
          <h2 class="text-xl font-bold text-white bg-green-600 p-3 rounded-t-lg mb-3">${this.t('purchaseHistory')}</h2>

          <div class="min-h-[200px] md:flex-1 overflow-y-auto">
            ${this.state.purchases.length === 0
              ? `<div class="text-center py-10 text-gray-400 text-sm">ບໍ່ມີປະຫວັດການຈັດຊື້ / No purchase history.</div>`
              : `<table class="w-full text-sm">
                  <thead class="sticky top-0 bg-gray-50 border-b z-10">
                    <tr>
                      <th class="text-left text-xs font-bold text-gray-500 uppercase py-2 px-3">ID / Date</th>
                      <th class="text-left text-xs font-bold text-gray-500 uppercase py-2 px-2">Supplier</th>
                      <th class="text-center text-xs font-bold text-gray-500 uppercase py-2 px-2">Items</th>
                      ${this.isAdmin() ? `<th class="py-2 px-2"></th>` : ''}
                    </tr>
                  </thead>
                  <tbody>
                    ${this.state.purchases.slice().reverse().map(p => `
                      <tr class="border-b hover:bg-gray-50 transition">
                        <td class="py-2 px-3">
                          <span class="block text-xs font-mono text-gray-500">${p.id}</span>
                          <span class="block text-xs text-gray-400">${p.date}</span>
                        </td>
                        <td class="py-2 px-2 font-medium text-gray-700 max-w-[120px]">
                          <span class="block truncate">${p.supplier}</span>
                        </td>
                        <td class="py-2 px-2 text-center text-gray-500">
                          <span class="inline-block bg-gray-100 rounded-full px-2 py-0.5 text-xs font-bold">${p.items.length}</span>
                        </td>
                        ${this.isAdmin() ? `
                        <td class="py-2 px-2">
                          <div class="flex gap-1 justify-end">
                            <button onclick="App.openPurchaseEditModal('${p.id}')"
                              class="px-2 py-1 rounded bg-blue-600 text-white text-xs hover:bg-blue-700">✏️</button>
                            <button onclick="App.showDeleteConfirm('purchase','${p.id}','${p.id}')"
                              class="px-2 py-1 rounded bg-red-600 text-white text-xs hover:bg-red-700">🗑️</button>
                          </div>
                        </td>` : ''}
                      </tr>`).join('')}
                  </tbody>
                </table>`
            }
          </div>
        </div>
      </div>
    `;
  },

  openPurchaseEditModal(purchaseId) {
    const p = this.state.purchases.find(x => x.id === purchaseId);
    if (!p) return;
    this._int.purchaseEditing = JSON.parse(JSON.stringify(p));
    this._int.purchaseModal = true;
    this.render();
  },

  closePurchaseModal() {
    this._int.purchaseModal = false;
    this._int.purchaseEditing = null;
    this.render();
  },

  // Read current input values into purchaseEditing before any re-render
  _syncPurchaseEditInputs() {
    const p = this._int.purchaseEditing;
    if (!p) return;
    const supplierEl = document.getElementById('purchase-edit-supplier');
    if (supplierEl) p.supplier = supplierEl.value;
    p.items.forEach((item, idx) => {
      const qtyEl = document.getElementById('pedit-qty-' + idx);
      const costEl = document.getElementById('pedit-cost-' + idx);
      if (qtyEl) item.qty = Math.max(1, parseInt(qtyEl.value) || 1);
      if (costEl) item.costPrice = Math.max(0, parseFloat(costEl.value) || 0);
    });
  },

  purchaseEditRemoveItem(idx) {
    this._syncPurchaseEditInputs();
    this._int.purchaseEditing.items.splice(idx, 1);
    this.render();
  },

  purchaseEditAddProduct(productId) {
    if (!productId) return;
    this._syncPurchaseEditInputs();
    const prod = this.state.products.find(p => String(p.id) === String(productId));
    if (!prod) return;
    // If already in list, just bump qty
    const existing = this._int.purchaseEditing.items.find(i => String(i.id) === String(prod.id));
    if (existing) { existing.qty += 1; }
    else {
      this._int.purchaseEditing.items.push({ id: prod.id, name: prod.name, qty: 1, costPrice: prod.costPrice });
    }
    this.render();
  },

  async savePurchaseEdit() {
    this._syncPurchaseEditInputs();
    const p = this._int.purchaseEditing;
    if (!p) return;
    if (!p.supplier.trim()) { alert('ກະລຸນາໃສ່ຊື່ຜູ້ສະໜອງ / Please enter supplier name.'); return; }
    if (!p.items.length) { alert('ກະລຸນາມີຢ່າງໜ້ອຍ 1 ລາຍການ / Please keep at least 1 item.'); return; }
    
    // Attach stockQty (base units) so server can correctly reverse/apply stock
    p.items = p.items.map(item => {
      const stockQty = item.weightItem ? item.qty
        : item.purchaseUnit==='box'  ? item.qty*(item.qtyInBox||1)
        : item.purchaseUnit==='pack' ? item.qty*(item.qtyInPack||1)
        : item.qty;
      return Object.assign({}, item, {stockQty});
    });
    p.totalCost = p.items.reduce((s,i) => s+(Number(i.costPrice)||0)*(Number(i.qty)||0), 0);

    const idx = this.state.purchases.findIndex(x => x.id === p.id);
    if (idx > -1) this.state.purchases[idx] = p;

    // Update frontend product costPrice immediately
    p.items.forEach(item => {
      const prod = this.state.products.find(x => String(x.id) === String(item.id));
      if (prod) prod.costPrice = Number(item.costPrice) || 0;
    });

    this._int.purchaseModal = false;
    this._int.purchaseEditing = null;
    this.render();
    
    try { await this.run('updatePurchase', p); }
    catch(err) { alert('Sheet update failed: ' + (err.message || err)); }
  },

  async deletePurchaseConfirmed(purchaseId) {
    this.state.purchases = this.state.purchases.filter(x => x.id !== purchaseId);
    this._int.deleteConfirm = null;
    this.render();
    try { await this.run('deletePurchase', purchaseId); }
    catch(err) { alert('Sheet delete failed: ' + (err.message || err)); }
  },

  cancelPurchaseForm() {
    this.state.purchaseCart = [];
    this._int.purchaseSupplier = '';
    const el = document.getElementById('purchase-supplier-name');
    if (el) el.value = '';
    this.render();
  },

  _savePurchaseSupplier() {
    const el = document.getElementById('purchase-supplier-name');
    if (el) this._int.purchaseSupplier = el.value;
  },

  _restorePurchaseSupplier() {
    const el = document.getElementById('purchase-supplier-name');
    if (el && this._int.purchaseSupplier != null) el.value = this._int.purchaseSupplier;
  },

  nudgePurchaseQty(id, delta) {
    const item = this.state.purchaseCart.find(i => String(i.id) === String(id));
    if (!item) return;
    
    // Parse current quantity and apply delta, ensuring a minimum of 1
    const currentQty = parseInt(item.qty) || 1;
    const newQty = Math.max(1, currentQty + delta);
    
    // Save supplier state and trigger your existing cart update function
    this._savePurchaseSupplier();
    if (typeof this.updatePurchaseCartQty === 'function') {
      this.updatePurchaseCartQty(id, newQty);
    } else {
      // Fallback in case updatePurchaseCartQty doesn't handle the DOM directly
      item.qty = newQty;
      const el = document.getElementById('qty-' + id);
      if (el) el.value = newQty;
    }
  },

  nudgePurchaseEditQty(idx, delta) {
    this._syncPurchaseEditInputs();
    const item = this._int.purchaseEditing.items[idx];
    if (item) {
      item.qty = Math.max(1, (parseInt(item.qty) || 1) + delta);
      this.render();
    }
  },

  nudgePurchaseCost(id, delta) {
    const item = this.state.purchaseCart.find(i => String(i.id) === String(id));
    if (!item) return;
    item.costPrice = Math.max(0, (parseFloat(item.costPrice) || 0) + delta);
    const el = document.getElementById('cost-' + id);
    if (el) el.value = item.costPrice;
  },

  handlePurchaseSelectChange() {
    const selectEl = document.getElementById('purchase-product-select');
    if (!selectEl) return;
    const val = selectEl.value;
    if (!val) return;
    this._savePurchaseSupplier();
    selectEl.value = '';
    App.addToPurchaseCart(val);
  },

  handlePurchaseEditSelectChange() {
    const selectEl = document.getElementById('purchase-edit-product-select');
    if (!selectEl) return;
    const val = selectEl.value;
    if (!val) return;
    selectEl.value = '';
    App.purchaseEditAddProduct(val);
  },

  renderPurchaseModal() {
    const p = this._int.purchaseEditing;
    if (!p) return '';
    const lang = this.state.language;
    const itemRows = p.items.map((item, idx) => `
      <tr class="border-b last:border-0">
        <td class="py-1.5 pr-2 text-sm text-gray-800 max-w-[140px]">
          <span class="block truncate">${(item.name && (item.name[lang] || item.name.lo || item.name.en)) || ''}</span>
        </td>
        <td class="py-1.5 px-1">
          <div class="flex items-center justify-center gap-0.5">
            <button onclick="App.nudgePurchaseEditQty(${idx}, -1)" class="w-7 h-7 rounded bg-green-300 active:bg-gray-300 text-gray-600 font-bold text-base leading-none flex items-center justify-center select-none">−</button>
            <input id="pedit-qty-${idx}" type="number" min="1" value="${item.qty}"
              class="w-16 p-1 text-center border rounded text-sm hide-arrows focus:outline-none focus:ring-1 focus:ring-blue-400">
            <button onclick="App.nudgePurchaseEditQty(${idx}, 1)" class="w-7 h-7 rounded bg-green-300 active:bg-gray-300 text-gray-600 font-bold text-base leading-none flex items-center justify-center select-none">+</button>
          </div>
        </td>
        <td class="py-1.5 px-1">
          <input id="pedit-cost-${idx}" type="number" min="0" value="${item.costPrice}"
            class="w-24 p-1 text-right border rounded text-sm hide-arrows focus:outline-none focus:ring-1 focus:ring-blue-400">
        </td>
        <td class="py-1.5 pl-1 text-center">
          <button onclick="App.purchaseEditRemoveItem(${idx})"
            class="w-6 h-6 rounded-full bg-red-100 hover:bg-red-500 text-red-600 hover:text-white font-bold text-base leading-none flex items-center justify-center transition">×</button>
        </td>
      </tr>`).join('');

    return `
    <div class="fixed inset-0 z-50 flex items-center justify-center p-4">
      <div class="absolute inset-0 bg-black bg-opacity-60" onclick="App.closePurchaseModal()"></div>
      <div class="relative bg-white rounded-2xl shadow-2xl w-full max-w-md flex flex-col" style="max-height:90vh">

        <div class="flex items-center justify-between border-b px-6 py-4 flex-shrink-0">
          <h3 class="text-lg font-bold text-gray-800">✏️ ${this.t('edit')} ${this.t('purchaseHistory')}</h3>
          <button onclick="App.closePurchaseModal()" class="text-gray-400 hover:text-gray-700 text-2xl leading-none">×</button>
        </div>

        <div class="overflow-y-auto flex-1 px-6 py-4 flex flex-col gap-4">

          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase mb-1">${this.t('supplier')}</label>
            <input id="purchase-edit-supplier" type="text" value="${p.supplier || ''}"
              class="w-full p-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
          </div>

          <div>
            <table class="w-full">
              <thead>
                <tr class="border-b">
                  <th class="text-center text-xs font-bold text-gray-500 uppercase pb-1.5 pr-2">Item</th>
                  <th class="text-center text-xs font-bold text-gray-500 uppercase pb-1.5 px-1">Qty</th>
                  <th class="text-center text-xs font-bold text-gray-500 uppercase pb-1.5 px-1">Cost (₭)</th>
                  <th class="w-8"></th>
                </tr>
              </thead>
              <tbody id="pedit-item-rows">
                ${itemRows || `<tr><td colspan="4" class="py-4 text-center text-gray-400 text-sm">No items</td></tr>`}
              </tbody>
            </table>
          </div>

          <div>
            <label class="block text-xs font-bold text-gray-600 uppercase mb-1">+ Add Product</label>
            <select id="purchase-edit-product-select" onchange="App.handlePurchaseEditSelectChange()"
              class="w-full p-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 text-sm">
              <option value="">-- ${this.t('selectProduct')} --</option>
              ${this.state.products.map(prod => `<option value="${prod.id}">${prod.name[lang] || prod.name.lo || prod.name.en || ''} (${prod.barcode || 'No Code'})</option>`).join('')}
            </select>
          </div>

        </div>

        <div class="flex gap-3 px-6 py-4 border-t flex-shrink-0">
          <button onclick="App.closePurchaseModal()" class="flex-1 border border-gray-400 text-red-500 py-3 rounded-lg text-lg font-bold hover:bg-red-600 hover:text-white">${this.t('cancel')}</button>
          <button onclick="App.savePurchaseEdit()" class="flex-1 py-2 bg-blue-600 text-white rounded-xl text-sm font-bold hover:bg-blue-700">${this.t('save')}</button>
        </div>
      </div>
    </div>`;
  },
});
</script>
<script>
// ═══ PAGE: CREDIT PAYMENTS ═════════════════════════════════════
Object.assign(App, {
  // Initialize credit state elements safely
  initCreditState() {
    if (!this.state.creditPayments) this.state.creditPayments = [];
    if (!this._int.creditFilter) this._int.creditFilter = 'active';
    if (this._int.creditPaymentModal === undefined) this._int.creditPaymentModal = false;
    if (!this._int.selectedCreditBill) this._int.selectedCreditBill = null;
  },

  async loadCreditData() {
    this.initCreditState();
    this.state.pageLoading = true;
    this.render();

    await this.ensureSalesLoaded();

    const res = await this.run('fetchCreditPayments');
    this.state.creditPayments = res.creditPayments || [];
    this.state._loaded.creditPayments = true;
    this.state.pageLoading = false;
    this.render();
  },

  openCreditPaymentModal(billNo) {
    this._int.selectedCreditBill = this.state.sales.find(s => s.billNo === billNo);
    this._int.creditPaymentModal = true;
    this.render();
  },

  closeCreditPaymentModal() {
    this._int.creditPaymentModal = false;
    this._int.selectedCreditBill = null;
    this.render();
  },

  async submitCreditPayment(ev) {
    ev.preventDefault();
    const lo = this.state.language === 'lo';
    const bill = this._int.selectedCreditBill;
    if (!bill) return;

    const amount = parseFloat(document.getElementById('credit-pay-amount').value);
    const method = document.getElementById('credit-pay-method').value;
    const note   = document.getElementById('credit-pay-note').value;

    // Dynamically calculate remaining allowed balance matching target formula
    const currentBalance = bill.total - ((bill.cashReceived || 0) + (bill.transferReceived || 0) + (bill.amountPaid || 0));

    if (!amount || amount <= 0 || amount > currentBalance) {
      alert(lo ? 'ຈຳນວນເງິນບໍ່ຖືກຕ້ອງ' : 'Invalid payment amount');
      return;
    }

    const payment = {
      id:     'PAY' + Date.now(),
      billNo: bill.billNo,
      date:   new Date().toISOString(),
      amount: amount,
      method: method,
      note:   note,
      by:     this.state.currentUser?.name || 'Cashier'
    };

    const btn = document.getElementById('credit-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = lo ? 'ກຳລັງບັນທຶກ...' : 'Saving...'; }

    const res = await this.run('addCreditPayment', payment);
    
    if (res.success) {
      this.state.creditPayments.push(payment);
      const saleInState = this.state.sales.find(s => s.billNo === bill.billNo);
      if (saleInState) {
        saleInState.amountPaid   = res.newPaid;
        saleInState.creditStatus = res.newStatus;
      }
      bill.amountPaid   = res.newPaid;
      bill.creditStatus = res.newStatus;
      alert(lo ? 'ບັນທຶກການຊຳລະສຳເລັດ!' : 'Payment recorded successfully!');
      this.closeCreditPaymentModal();
    } else {
      alert('Error: ' + res.message);
      if (btn) { btn.disabled = false; btn.textContent = lo ? 'ບັນທຶກການຊຳລະ' : 'Save Payment'; }
    }
  },

  async deleteCreditPayment(paymentId, billNo) {
    const lo = this.state.language === 'lo';
    if (!confirm(lo ? 'ທ່ານຕ້ອງການລຶບການຊຳລະນີ້ບໍ?' : 'Delete this payment entry?')) return;

    const res = await this.run('deleteCreditPayment', { id: paymentId, billNo });

    if (res.success) {
      this.state.creditPayments = this.state.creditPayments.filter(p => p.id !== paymentId);
      const saleInState = this.state.sales.find(s => s.billNo === billNo);
      if (saleInState) {
        saleInState.amountPaid   = res.newPaid;
        saleInState.creditStatus = res.newStatus;
      }
      if (this._int.selectedCreditBill?.billNo === billNo) {
        this._int.selectedCreditBill.amountPaid   = res.newPaid;
        this._int.selectedCreditBill.creditStatus = res.newStatus;
      }
      this.render();
    } else {
      alert('Error: ' + (res.message || 'Could not delete payment'));
    }
  },

  renderCreditPage() {
    this.initCreditState();
    const lo = this.state.language === 'lo';

    if (this.state.pageLoading) {
      return `<div class="flex items-center justify-center h-full py-24">
        <div class="text-center text-gray-400">
          <div class="animate-spin text-4xl mb-3">⏳</div>
          <p class="text-sm font-medium">${lo ? 'ກຳລັງໂຫລດຂໍ້ມູນໜີ້…' : 'Loading credit data…'}</p>
        </div>
      </div>`;
    }

    if (!this.state._loaded || !this.state._loaded.creditPayments) {
      this.loadCreditData();
      return `<div class="flex items-center justify-center h-full py-24">
        <div class="text-center text-gray-400">
          <div class="animate-spin text-4xl mb-3">⏳</div>
          <p class="text-sm font-medium">${lo ? 'ກຳລັງກຽມບັນຊີໜີ້…' : 'Preparing ledger…'}</p>
        </div>
      </div>`;
    }

    // ── 1. CORE STATUS CALCULATION ENGINE ──
    const getStatus = (s) => {
      const balance = s.total - ((s.cashReceived || 0) + (s.transferReceived || 0) + (s.amountPaid || 0));
      if (balance <= 0) return 'paid';
      if (balance === s.total) return 'unpaid';
      return 'partial';
    };

    // ── 2. FILTER PROCESSING VIA BALANCES ──
    let allSales = [...(this.state.sales || [])];

    if (this._int.creditFilter === 'active') {
      allSales = allSales.filter(s => getStatus(s) !== 'paid');
    } else if (this._int.creditFilter === 'paid') {
      allSales = allSales.filter(s => getStatus(s) === 'paid');
    } else if (this._int.creditFilter === 'credit') {
      allSales = allSales.filter(s => s.paymentMethod === 'credit' || s.paymentMethod === 'mixed');
    }

    // ── 3. SORTING AGING (Unpaid & Partials first, then chronological order) ──
    allSales.sort((a, b) => {
      const ua = getStatus(a) !== 'paid' ? 0 : 1;
      const ub = getStatus(b) !== 'paid' ? 0 : 1;
      if (ua !== ub) return ua - ub;
      return new Date(b.date) - new Date(a.date);
    });

    // ── 4. RENDER DESIGN HELPERS ──
    const statusLabel = (st) => {
      if (lo) {
        if (st === 'paid') return 'ຊຳລະແລ້ວ';
        if (st === 'partial') return 'ຊຳລະບາງສ່ວນ';
        return 'ຍັງບໍ່ຊຳລະ';
      }
      return st.toUpperCase();
    };

    const statusColor = (st) =>
      st === 'paid' ? 'bg-green-100 text-green-800' :
      st === 'partial' ? 'bg-yellow-100 text-yellow-800' :
                         'bg-red-100 text-red-800';

    const pmColor = m =>
      m === 'credit'        ? 'bg-red-600 text-white'    :
      m === 'Transfer'      ? 'bg-purple-600 text-white' :
      m === 'cash_transfer' ? 'bg-indigo-600 text-white' :
                              'bg-blue-600 text-white';

    // ── 5. DATA ROW ARRAY GENERATION ──
    const tableRows = allSales.map(sale => {
      const status = getStatus(sale);
      const isUnpaid = status !== 'paid'; // Highlight red if status is partial or unpaid
      const rowBg = isUnpaid ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-gray-50';
      
      const balance = sale.total - ((sale.cashReceived || 0) + (sale.transferReceived || 0) + (sale.amountPaid || 0));
      const hasHistory = this.state.creditPayments.some(p => p.billNo === sale.billNo);

      return `
        <tr class="border-b cursor-pointer ${rowBg} text-gray-700"
            onclick="App.openCreditPaymentModal('${sale.billNo}')">
          <td class="p-3 text-sm font-medium ${isUnpaid ? 'text-red-700 font-bold' : ''}">${sale.billNo}</td>
          <td class="p-3 text-sm">${sale.customer || (lo ? 'ລູກຄ້າທົ່ວໄປ' : 'Walk-in')}</td>
          <td class="p-3 text-xs text-gray-500 whitespace-nowrap">${fmt.dateTime ? fmt.dateTime(sale.date) : new Date(sale.date).toLocaleDateString()}</td>
          <td class="p-3 text-sm font-bold">${fmt.currency(sale.total)}</td>
          <td class="p-3 text-sm text-green-600 font-medium">${fmt.currency(sale.amountPaid || 0)}</td>
          <td class="p-3 text-sm font-bold ${isUnpaid ? 'text-red-600' : 'text-gray-300'}">${balance > 0 ? fmt.currency(balance) : '—'}</td>
          <td class="p-3"><span class="px-2 py-0.5 rounded text-xs font-bold ${statusColor(status)}">${statusLabel(status)}</span></td>
          <td class="p-3"><span class="inline-block px-2 py-0.5 rounded text-xs ${pmColor(sale.paymentMethod)}">${this.t(sale.paymentMethod)||sale.paymentMethod}</span></td>
          <td class="p-3 text-xs text-gray-400">${sale.cashier||''}</td>
          <td class="p-3">
            ${isUnpaid ? `<button onclick="event.stopPropagation();App.openCreditPaymentModal('${sale.billNo}')" class="bg-blue-600 text-white px-3 py-1 rounded text-xs font-medium hover:bg-blue-700 transition whitespace-nowrap">${lo ? 'ເກັບເງິນ' : 'Collect'}</button>` :
              hasHistory ? `<span class="text-xs text-green-600">${lo ? 'ຊຳລະຄົບ' : 'Settled'}</span>` : '—'}
          </td>
        </tr>
      `;
    }).join('');

    // ── 6. TRANSACTION DETAIL DIALOG MODAL ──
    let modalHtml = '';
    if (this._int.creditPaymentModal && this._int.selectedCreditBill) {
      const bill = this._int.selectedCreditBill;
      const balance = bill.total - ((bill.cashReceived || 0) + (bill.transferReceived || 0) + (bill.amountPaid || 0));
      const receivedAtSale = (bill.cashReceived || 0) + (bill.transferReceived || 0);
      const originalCreditOwed = bill.total - receivedAtSale;

      // Pre-format all values to avoid fmt.currency() inside deep nested templates
      const fTotal            = fmt.currency(bill.total);
      const fCashReceived     = fmt.currency(bill.cashReceived);
      const fTransferReceived = fmt.currency(bill.transferReceived);
      const fOriginalCredit   = fmt.currency(originalCreditOwed);
      const fAmountPaid       = fmt.currency(bill.amountPaid || 0);
      const fBalance          = fmt.currency(balance);
      
      const historyRows = this.state.creditPayments
        .filter(p => p.billNo === bill.billNo)
        .map(p => {
          const fAmt = fmt.currency(p.amount);
          const dateStr = new Date(p.date).toLocaleDateString();
          const noteHtml = p.note ? `<p class="text-gray-400 italic text-[10px]">${p.note}</p>` : '';
          return `
          <div class="text-xs border-b py-1.5 flex justify-between items-center text-gray-600">
            <div>
              <p class="font-medium">${dateStr} — <span class="uppercase">${p.method}</span></p>
              ${noteHtml}
            </div>
            <div class="flex items-center gap-2">
              <span class="font-bold text-green-600">+${fAmt}</span>
              ${App.isAdmin() ? `<button onclick="App.deleteCreditPayment('${p.id}','${bill.billNo}')"
                class="text-red-400 hover:text-red-600 font-bold text-sm leading-none transition" title="${lo ? 'ລຶບ' : 'Delete'}">✕</button>` : ''}
            </div>
          </div>`;
        }).join('') || `<div class="text-xs text-gray-400 py-2 text-center">${lo ? 'ຍັງບໍ່ມີປະຫວັດການຊຳລະ' : 'No payment logs found.'}</div>`;

      modalHtml = `
      <div class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4 animate-fadeIn">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-md p-5 border">
          <div class="flex justify-between items-center mb-4">
            <h2 class="text-lg font-bold text-gray-800">${lo ? 'ເກັບເງິນ:' : 'Payment Collection:'} ${bill.billNo}</h2>
            <button onclick="App.closeCreditPaymentModal()" class="text-gray-400 hover:text-gray-600 text-xl leading-none">&times;</button>
          </div>
          
          <div class="bg-gray-50 border rounded-lg p-3 mb-4 space-y-1">
            <div class="flex justify-between text-xs text-gray-500">
              <span>${lo ? 'ລວມທັງໝົດ:' : 'Invoice Grand Total:'}</span>
              <span class="font-semibold">${fTotal}</span>
            </div>
            ${(bill.cashReceived > 0) ? `
            <div class="flex justify-between text-xs text-gray-500">
              <span>${lo ? 'ຈ່າຍສົດ:' : 'Cash Received:'}</span>
              <span class="font-semibold">${fCashReceived}</span>
            </div>` : ''}
            ${(bill.transferReceived > 0) ? `
            <div class="flex justify-between text-xs text-gray-500">
              <span>${lo ? 'ໂອນ:' : 'Transfer Received:'}</span>
              <span class="font-semibold">${fTransferReceived}</span>
            </div>` : ''}
            <div class="flex justify-between text-xs text-blue-600">
              <span>${lo ? 'ໜີ້ຕົ້ນ:' : 'Original Credit Amount:'}</span>
              <span class="font-semibold">${fOriginalCredit}</span>
            </div>
            <div class="flex justify-between text-xs text-green-600">
              <span>${lo ? 'ເກັບໄດ້ແລ້ວ:' : 'Collected Progress:'}</span>
              <span class="font-semibold">${fAmountPaid}</span>
            </div>
            <div class="flex justify-between text-sm text-red-600 font-bold border-t pt-1.5 mt-1">
              <span>${lo ? 'ຍັງຄ້າງຊຳລະ:' : 'Outstanding Balance:'}</span>
              <span>${fBalance}</span>
            </div>
          </div>

          <div class="mb-4">
            <h3 class="text-[11px] font-bold text-gray-400 mb-1 uppercase tracking-wider">${lo ? 'ປະຫວັດການຊຳລະ' : 'Payment Breakdown History'}</h3>
            <div class="max-h-28 overflow-y-auto border bg-gray-50 rounded-lg px-3 py-1">
              ${historyRows}
            </div>
          </div>

          <form onsubmit="App.submitCreditPayment(event)" class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${lo ? 'ຈຳນວນທີ່ຮັບ' : 'Payment Received Amount'}</label>
              <input type="number" id="credit-pay-amount" max="${balance}" value="${balance}" required class="w-full border p-2 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${lo ? 'ຊ່ອງທາງ' : 'Channel Method'}</label>
                <select id="credit-pay-method" class="w-full border p-2 rounded-lg text-sm bg-white outline-none">
                  <option value="cash">${lo ? '💵 ເງິນສົດ' : '💵 Cash'}</option>
                  <option value="transfer">${lo ? '📱 ໂອນເງິນ' : '📱 Bank Transfer'}</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">${lo ? 'ໝາຍເຫດ (ທາງເລືອກ)' : 'Optional Memo'}</label>
                <input type="text" id="credit-pay-note" placeholder="${lo ? 'ເຊັ່ນ: ງວດ 2' : 'e.g. installment 2'}" class="w-full border p-2 rounded-lg text-sm outline-none">
              </div>
            </div>
            <button type="submit" id="credit-submit-btn" class="w-full bg-green-600 text-white text-sm font-bold py-2.5 rounded-lg hover:bg-green-700 transition shadow-md">
              ${lo ? 'ບັນທຶກການຊຳລະ' : 'Post Clearance Entry'}
            </button>
          </form>
        </div>
      </div>`;
    }

    // ── Dropdown Filter Items ──
    const filterOpts = [
      { val:'active', lo:'ຍັງບໍ່ຊຳລະ / ຊຳລະບາງສ່ວນ', en:'Unpaid / Partial'  },
      { val:'credit', lo:'ຂາຍຕິດໜີ້ທັງໝົດ',           en:'Credit Sales Only' },
      { val:'paid',   lo:'ຊຳລະຄົບແລ້ວ',               en:'Fully Paid'        },
      { val:'all',    lo:'ລາຍການທັງໝົດ',               en:'All Sales'         },
    ];

    // ── Table UI Columns ──
    const headers = lo
      ? ['ເລກບິນ','ລູກຄ້າ','ວັນທີ','ລວມ','ຊຳລະແລ້ວ','ຍັງຄ້າງ','ສະຖານະ','ຊຳລະ','ໂດຍ','ຈັດການ']
      : ['Bill No','Customer','Date','Total','Paid','Balance','Status','Payment','Cashier','Action'];

    return `
      <div class="p-4 h-full flex flex-col bg-gray-50">
        <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2 mb-4">
          <div>
            <h1 class="text-xl font-bold text-gray-800">${lo ? 'ລູກໜີ້ / ບັນຊີຕິດໜີ້' : 'Accounts Receivable (Credit Flow Ledger)'}</h1>
            <p class="text-xs text-gray-500">${lo ? 'ຕິດຕາມການຊຳລະ, ຜ່ອນຊຳລະ ແລະ ສະຖານະໜີ້ສິນ' : 'Track balance clearings, installment cash flows, and credit aging lines.'}</p>
          </div>
          <select onchange="App._int.creditFilter = this.value; App.render()" class="border p-2 rounded-lg text-xs shadow-sm bg-white outline-none font-medium">
            ${filterOpts.map(o => `<option value="${o.val}" ${this._int.creditFilter === o.val ? 'selected' : ''}>${lo ? o.lo : o.en}</option>`).join('')}
          </select>
        </div>
        <div class="bg-white rounded-xl shadow-sm border flex-1 overflow-auto">
          <table class="w-full text-left border-collapse min-w-[800px]">
            <thead class="bg-gray-50 sticky top-0 border-b">
              <tr>
                ${headers.map(h => `<th class="p-3 text-xs font-bold uppercase tracking-wider text-gray-400">${h}</th>`).join('')}
              </tr>
            </thead>
            <tbody>
              ${tableRows || `<tr><td colspan="10" class="text-center py-12 text-sm text-gray-400 font-medium">${lo ? 'ບໍ່ພົບຂໍ້ມູນລູກໜີ້ໃນຕົວກອງນີ້' : 'No accounts receivable found under this filter query.'}</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
      ${modalHtml}
    `;
  }
});
</script>
<script>
// ═══ PAGE: SHIFT ═══════════════════════════════════════════════
Object.assign(App, {

  /* ─── SHIFT STATE INIT ─── */
  initShiftState() {
    if (!this.state.shifts)             this.state.shifts = [];
    if (!this.state.activeShift)        this.state.activeShift = null;
    if (!this._int.shiftHistoryFilter)  this._int.shiftHistoryFilter = 'today';
    if (!this._int.shiftCloseModal)     this._int.shiftCloseModal = false;
    if (!this._int.shiftCountedCash)    this._int.shiftCountedCash = '';
    if (!this._int.shiftCloseNote)      this._int.shiftCloseNote = '';
  },

  /* ─── LOAD SHIFT DATA ─── */
  async loadShiftData() {
    this.initShiftState();
    this.state.pageLoading = true;
    this.render();
    try {
      // Fetch shifts AND refresh expenses, sales, creditPayments in parallel so computeShiftSummary has fresh data
      const [res, coreData, salesRes, cpRes] = await Promise.all([
        this.run('fetchShifts'),
        this.run('fetchCoreData'),
        this.run('fetchSales'),
        this.run('fetchCreditPayments'),
      ]);
      this.state.shifts = res.shifts || [];
      this.state.activeShift = this.state.shifts.find(
        s => s.status === 'open' && s.cashier === (this.state.currentUser?.name || '')
      ) || null;
      // Refresh expenses, sales, creditPayments so shift summary is accurate
      if (coreData?.expenses)        this.state.expenses        = coreData.expenses;
      if (salesRes?.sales)           { this.state.sales = salesRes.sales; this.state._loaded.sales = true; }
      if (cpRes?.creditPayments)     this.state.creditPayments  = cpRes.creditPayments;
      this.state._loaded.shifts = true;
    } catch(e) {
      alert('Failed to load shifts: ' + e.message);
    }
    this.state.pageLoading = false;
    this.render();
  },

  /* ─── OPEN SHIFT ─── */
  async openShift() {
    this.initShiftState();
    if (this.state.activeShift) {
      alert(this.state.language === 'lo'
        ? 'ທ່ານມີຫີບເປີດຢູ່ແລ້ວ. ກະລຸນາປິດກ່ອນ.'
        : 'You already have an open shift. Close it first.');
      return;
    }
    const floatInput = document.getElementById('shift-open-float');
    const noteInput  = document.getElementById('shift-open-note');
    const openingFloat = parseFloat(floatInput?.value || '0') || 0;
    const note = noteInput?.value?.trim() || '';

    const shift = {
      id:           'SH' + Date.now(),
      cashier:      this.state.currentUser?.name || 'Cashier',
      cashierId:    this.state.currentUser?.id   || '',
      openedAt:     new Date().toISOString(),
      closedAt:     '',
      openingFloat: openingFloat,
      closingFloat: 0,
      countedCash:  0,
      cashSales:    0,
      transferSales:0,
      creditSales:  0,
      creditCollected: 0,
      expensesPaid: 0,
      expectedCash: 0,
      difference:   0,
      status:       'open',
      note:         note,
    };

    const btn = document.getElementById('shift-open-btn');
    if (btn) { btn.disabled = true; btn.textContent = this.state.language === 'lo' ? 'ກຳລັງເປີດ…' : 'Opening…'; }

    try {
      const res = await this.run('openShift', shift);
      if (res.success) {
        this.state.activeShift = shift;
        this.state.shifts.unshift(shift);
        this.render();
      } else {
        alert('Error: ' + res.message);
        if (btn) { btn.disabled = false; btn.textContent = this.t('shiftOpen'); }
      }
    } catch(e) {
      alert('Error: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = this.t('shiftOpen'); }
    }
  },

  /* ─── OPEN CLOSE MODAL ─── */
  openShiftCloseModal() {
    if (!this.state.activeShift) return;
    this._int.shiftCloseModal  = true;
    this._int.shiftCountedCash = '';
    this._int.shiftCloseNote   = '';
    this.render();
    requestAnimationFrame(() => {
      const el = document.getElementById('shift-counted-cash');
      if (el) el.focus();
    });
  },

  closeShiftCloseModal() {
    this._int.shiftCloseModal = false;
    this.render();
  },

  /* ─── COMPUTE SHIFT SUMMARY (live) ─── */
  computeShiftSummary(shift) {
    if (!shift) return null;
    const oDate = new Date(shift.openedAt);
    const cDate = shift.closedAt ? new Date(shift.closedAt) : new Date();

    const sales = (this.state.sales || []).filter(s => {
      const sDate = new Date(s.date);
      return sDate >= oDate && sDate <= cDate && s.cashier === shift.cashier;
    });
    const creditPayments = (this.state.creditPayments || []).filter(p => {
      const pDate = new Date(p.date);
      // 'by' or 'cashier' field — support both
      const pBy = p.by || p.cashier || '';
      return pDate >= oDate && pDate <= cDate && pBy === shift.cashier;
    });
    const creditPaymentsCash     = creditPayments.filter(p => (p.method || 'cash') === 'cash');
    const creditPaymentsTransfer = creditPayments.filter(p => (p.method || '') === 'transfer');
    const expenses = (this.state.expenses || []).filter(ex => {
      const eDate = new Date(ex.date);
      // Count all expenses in the shift window — paidBy may be blank or any cashier
      // Filter by cashier if paidBy is set, otherwise include all in the time window
      const paidBy = ex.paidBy || '';
      const byThisCashier = !paidBy || paidBy === shift.cashier;
      return eDate >= oDate && eDate <= cDate && byThisCashier;
    });

    const cashSales               = sales.filter(s => s.paymentMethod === 'cash').reduce((a, s) => a + s.total, 0);
    const transferSales           = sales.filter(s => s.paymentMethod === 'transfer' || s.paymentMethod === 'Transfer').reduce((a, s) => a + s.total, 0);
    const cashTransferSales       = sales.filter(s => s.paymentMethod === 'cash_transfer').reduce((a, s) => a + s.total, 0);
    const creditSales             = sales.filter(s => s.paymentMethod === 'credit' || s.paymentMethod === 'mixed').reduce((a, s) => a + s.total, 0);
    const creditCollectedCash     = creditPaymentsCash.reduce((a, p) => a + p.amount, 0);
    const creditCollectedTransfer = creditPaymentsTransfer.reduce((a, p) => a + p.amount, 0);
    const creditCollected         = creditCollectedCash + creditCollectedTransfer; // total for display
    const expensesPaid            = expenses.reduce((a, e) => a + e.amount, 0);
    // Mixed: only cash portion = cashReceived from mixed sales
    const mixedCashIn = sales.filter(s => s.paymentMethod === 'mixed').reduce((a, s) => a + (s.cashReceived || 0), 0);
    // cash_transfer: split into cash and transfer portions — never fall back to s.total
    const cashTransferList       = sales.filter(s => s.paymentMethod === 'cash_transfer');
    const cashTransferCashIn     = cashTransferList.reduce((a, s) => a + (s.cashReceived     || 0), 0);
    const cashTransferTransferIn = cashTransferList.reduce((a, s) => a + (s.transferReceived || 0), 0);
    // Transfer sales: any cash change given out leaves the tray
    const transferChangeCashOut = sales
      .filter(s => s.paymentMethod === 'Transfer' && s.change > 0)
      .reduce((a, s) => a + s.change, 0);

    // Expected cash in tray = float + cash sales + cash portion of mixed/cash_transfer + cash credit collections - cash expenses - cash change given out
    const expectedCash = shift.openingFloat + cashSales + mixedCashIn + cashTransferCashIn + creditCollectedCash - expensesPaid - transferChangeCashOut;

    return {
      cashSales, transferSales, cashTransferSales, creditSales,
      cashTransferCashIn, cashTransferTransferIn,
      creditCollectedCash, creditCollectedTransfer, creditCollected,
      expensesPaid, mixedCashIn,
      transferChangeCashOut,
      expectedCash,
      totalSales: cashSales + transferSales + cashTransferSales + creditSales,
      txCount: sales.length,
    };
  },

  /* ─── CLOSE SHIFT ─── */
  async closeShift() {
    const shift = this.state.activeShift;
    if (!shift) return;

    const countedCash = parseFloat(document.getElementById('shift-counted-cash')?.value || '0') || 0;
    const note = document.getElementById('shift-close-note')?.value?.trim() || '';

    const summary    = this.computeShiftSummary(shift);
    const difference = countedCash - (summary?.expectedCash || 0);

    const closedShift = {
      ...shift,
      closedAt:                new Date().toISOString(),
      countedCash:             countedCash,
      cashSales:               summary?.cashSales || 0,
      transferSales:           summary?.transferSales || 0,
      cashTransferSales:       summary?.cashTransferSales || 0,
      creditSales:             summary?.creditSales || 0,
      creditCollectedCash:     summary?.creditCollectedCash || 0,
      creditCollectedTransfer: summary?.creditCollectedTransfer || 0,
      allcreditCollected:      summary?.creditCollected || 0,
      expensesPaid:            summary?.expensesPaid || 0,
      expectedCash:            summary?.expectedCash || 0,
      difference:              difference,
      status:                  'closed',
      note:                    note || shift.note,
    };

    const btn = document.getElementById('shift-close-confirm-btn');
    const lo = this.state.language === 'lo';
    if (btn) { btn.disabled = true; btn.textContent = lo ? 'ກຳລັງປິດ…' : 'Closing…'; }

    try {
      const res = await this.run('closeShift', closedShift);
      if (res.success) {
        const idx = this.state.shifts.findIndex(s => s.id === shift.id);
        if (idx > -1) this.state.shifts[idx] = closedShift;
        this.state.activeShift = null;
        this._int.shiftCloseModal = false;
        this.render();
        // Auto-print shift report after close
        setTimeout(() => this.printShiftReport(closedShift, summary), 300);
      } else {
        alert('Error: ' + res.message);
        if (btn) { btn.disabled = false; btn.textContent = lo ? 'ຢືນຢັນປິດ' : 'Confirm Close'; }
      }
    } catch(e) {
      alert('Error: ' + e.message);
      if (btn) { btn.disabled = false; btn.textContent = lo ? 'ຢືນຢັນປິດ' : 'Confirm Close'; }
    }
  },

  /* ─── PRINT SHIFT REPORT ─── */
  printShiftReport(shift, summary) {
    const lo = this.state.language === 'lo';
    // Get all sales in this shift window
    const oDate = new Date(shift.openedAt);
    const cDate = shift.closedAt ? new Date(shift.closedAt) : new Date();
    const sales = (this.state.sales || []).filter(s => {
      const sDate = new Date(s.date);
      return sDate >= oDate && sDate <= cDate && s.cashier === shift.cashier;
    }).sort((a,b) => new Date(a.date) - new Date(b.date));

    const txRows = sales.map(s => `
      <tr>
        <td>${fmt.dateTime(s.date)}</td>
        <td>${s.billNo||''}</td>
        <td>${s.customer||'—'}</td>
        <td style="text-align:right">${fmt.currency(s.total)}</td>
        <td style="text-align:center">${s.paymentMethod||''}</td>
      </tr>`).join('');

    const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
    <title>Shift Report — ${shift.cashier}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700&family=Noto+Sans:wght@400;600;700&display=swap');
      * { font-family: 'Noto Sans Lao', 'Noto Sans', sans-serif; color: #000; }
      body { font-size: 20px; padding: 20px; }
      h1 { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
      .sub { font-size: 14px; color: #000; margin-bottom: 14px; }
      table { border-collapse: collapse; width: 100%; margin-top: 10px; }
      th, td { border: 1px solid #999; padding: 5px 8px; font-size: 12px; color: #000; }
      th { background: #e8e8e8; font-weight: 700; text-align: left; }
      .row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #e0e0e0; font-size: 20px; }
      .row span:first-child { font-weight: 400; font-size: 20px; color: #000; }
      .row span:last-child { font-weight: 400; font-size: 20px; color: #000; }
      .row-total { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; margin-top: 4px; border-top: 2px solid #000; font-size: 20px; font-weight: 700; }
      .section { margin-top: 14px; border-top: 2px dashed #555; padding-top: 10px; }
      @media print { body { padding: 0; } }
    </style></head><body>
    <h1>🗃️ ${lo ? 'ລາຍງານຫີບ' : 'Shift Report'}</h1>
    <div class="sub">
      ${shift.cashier} &nbsp;|&nbsp;
      ${lo ? 'ເປີດ' : 'Opened'}: ${fmt.dateTime(shift.openedAt)} &nbsp;|&nbsp;
      ${shift.closedAt ? (lo?'ປິດ':'Closed')+': '+fmt.dateTime(shift.closedAt) : (lo?'ຍັງເປີດ':'Still Open')}

              <input type="text" id="shift-close-note" placeholder="${lo ? 'ເຊັ່ນ: ຮອບແລງ, ສົ່ງໃຫ້ຜູ້ຈັດການ' : 'e.g. evening shift, handed to manager'}"

              class="w-full bg-red-600 text-white font-bold py-2.5 rounded-lg hover:bg-red-700 transition shadow-md text-sm">
              ${lo ? 'ຢືນຢັນປິດຫີບ' : 'Confirm Close Shift'}

            <button onclick="App.printShiftReport(App.state.activeShift, App.computeShiftSummary(App.state.activeShift))"

              🖨️ ${lo ? 'ພິມລາຍງານຫີບ' : 'Print Shift Report'}

    // ── History filter labels ──
    const filterOpts = [
      { val:'today', lo:'ມື້ນີ້',    en:'Today'      },
      { val:'week',  lo:'ອາທິດນີ້',  en:'This week'  },
      { val:'month', lo:'ເດືອນນີ້',  en:'This month' },
      { val:'all',   lo:'ທັງໝົດ',    en:'All time'   },
    ];

    // ── Header columns ──
    const cols = lo
      ? ['ເວລາເປີດ','ພະນັກງານ','ໄລຍະເວລາ','ເງິນຕັ້ງຕົ້ນ','ຂາຍສົດ','ໂອນ','ເກັບໜີ້','ລາຍຈ່າຍ','ຄາດວ່າຈະມີ','ນັບໄດ້','ຜິດສ່ວນ','ໝາຍເຫດ','']
      : ['Opened At','Cashier','Duration','Float','Cash Sales','Transfer','Collected','Expenses','Expected','Counted','Difference','Note',''];

    return `
      <div class="p-4 bg-gray-50 min-h-full">
        <div class="mb-4">
          <h1 class="text-xl font-bold text-gray-800">${lo ? 'ຫີບເກັບເງິນ / ຈັດການລາຍຮັບ' : 'Cashier Shift / Tray Management'}</h1>
          <p class="text-xs text-gray-500">${lo ? 'ເປີດຫີບກ່ອນເລີ່ມຂາຍ. ປິດເພື່ອນັບເງິນທ້າຍວັນ.' : 'Open a shift to start counting. Close it at end of day to reconcile the tray.'}</p>
        </div>

        ${activePanel}

        <div class="bg-white rounded-xl border shadow-sm">
          <div class="flex justify-between items-center p-4 border-b">
            <h2 class="text-sm font-bold text-gray-700">${this.t('shiftHistory')}</h2>
            <select onchange="App._int.shiftHistoryFilter = this.value; App.render()"
              class="border rounded-lg text-xs p-1.5 bg-white outline-none">
              ${filterOpts.map(o => `<option value="${o.val}" ${this._int.shiftHistoryFilter===o.val?'selected':''}>${lo ? o.lo : o.en}</option>`).join('')}
            </select>

                  ${cols.map(h=>`<th class="p-3 text-[10px] font-bold uppercase tracking-wider text-gray-500 whitespace-nowrap">${h}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${historyRows || `<tr><td colspan="13" class="text-center py-10 text-sm text-gray-500">${lo ? 'ບໍ່ມີຂໍ້ມູນຫີບໃນຊ່ວງນີ້' : 'No closed shifts in this period.'}</td></tr>`}
              </tbody>
